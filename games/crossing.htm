<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Singapore Crossing — POV Game for Kids</title>
  <style>
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial,Helvetica,sans-serif;background:#9ad3ff}
    #container{width:100%;height:100%;position:relative;overflow:hidden}
    #ui{position:absolute;left:16px;top:16px;z-index:5;color:#012;}
    .panel{background:rgba(255,255,255,0.9);padding:12px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.15)}
    h1{font-size:18px;margin:0 0 8px 0}
    p{margin:6px 0;font-size:14px}
    button{font-size:16px;padding:8px 12px;border-radius:8px;border:none;background:#06b; color:white;cursor:pointer}
    .big-btn{font-size:20px;padding:12px 18px}
    #message{position:absolute;left:50%;top:18px;transform:translateX(-50%);z-index:6;pointer-events:none;font-size:24px;background:rgba(255,255,255,0.95);padding:8px 14px;border-radius:12px}
    #footer{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);font-size:14px;color:#012}
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="ui" class="panel">
    <h1>Singapore Crossing — Learn to Cross</h1>
    <p id="score">Score: 0</p>
    <p>POV of the child. Wait for the <b>green man</b> pedestrian light, not the car light!</p>
    <div style="display:flex;gap:8px;align-items:center">
      <button id="startBtn" class="big-btn">Start</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>
  <div id="message" style="display:none"></div>
  <div id="footer">Designed for 6-year-olds • Singapore style crossing</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
  <script>
  const container = document.getElementById('container');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x9ad3ff);

  // POV camera (child view)
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(-9,1.6,-8);

  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  container.appendChild(renderer.domElement);

  const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 0.9);
  hemi.position.set(0,50,0); scene.add(hemi);
  const dir = new THREE.DirectionalLight(0xffffff, 0.6); dir.position.set(5,10,7); scene.add(dir);

  // ground and road
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(60, 40), new THREE.MeshStandardMaterial({color:0x78c06a}));
  ground.rotation.x = -Math.PI/2; ground.position.y = -0.01; scene.add(ground);
  const road = new THREE.Mesh(new THREE.PlaneGeometry(24, 10), new THREE.MeshStandardMaterial({color:0x333333}));
  road.rotation.x = -Math.PI/2; scene.add(road);

  // zebra crossing
  const stripeMat = new THREE.MeshStandardMaterial({color:0xffffff});
  for(let i=0;i<8;i++){
    const stripe = new THREE.Mesh(new THREE.BoxGeometry(1.8,0.02,0.9), stripeMat);
    stripe.position.set(-7 + i*2, 0.01, 0);
    scene.add(stripe);
  }

  // player (invisible, just for collisions)
  const player = new THREE.Object3D();
  player.position.set(-9,0,-8);
  scene.add(player);

  // function to build pedestrian light pole with box + red/green man
  function createPedestrianLight(x,z){
    const group = new THREE.Group();
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,3), new THREE.MeshStandardMaterial({color:0x333333}));
    pole.position.set(x,1.5,z); group.add(pole);
    const box = new THREE.Mesh(new THREE.BoxGeometry(0.8,1.8,0.6), new THREE.MeshStandardMaterial({color:0x111111}));
    box.position.set(x,2.4,z); group.add(box);
    const redMan = new THREE.Mesh(new THREE.SphereGeometry(0.18), new THREE.MeshStandardMaterial({color:0x440000,emissive:0x220000}));
    redMan.position.set(x,2.9,z);
    const greenMan = new THREE.Mesh(new THREE.SphereGeometry(0.18), new THREE.MeshStandardMaterial({color:0x004400,emissive:0x002200}));
    greenMan.position.set(x,1.9,z);
    group.add(redMan); group.add(greenMan);
    scene.add(group);
    return {redMan, greenMan};
  }

  // create pedestrian lights at both ends of crossing
  const pedLights1 = createPedestrianLight(8,-6.5);
  const pedLights2 = createPedestrianLight(-8,6.5);

  // Car traffic light pole
  const carLight = new THREE.Group();
  const carPole = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,3), new THREE.MeshStandardMaterial({color:0x333333}));
  carPole.position.set(-8,1.5,-6.5); carLight.add(carPole);
  const carBox = new THREE.Mesh(new THREE.BoxGeometry(0.8,2,0.6), new THREE.MeshStandardMaterial({color:0x111111}));
  carBox.position.set(-8,2.4,-6.5); carLight.add(carBox);
  const carRed = new THREE.Mesh(new THREE.SphereGeometry(0.18), new THREE.MeshStandardMaterial({color:0x440000,emissive:0x220000})); carRed.position.set(-8,3.1,-6.5);
  const carAmber = new THREE.Mesh(new THREE.SphereGeometry(0.18), new THREE.MeshStandardMaterial({color:0x444400,emissive:0x222200})); carAmber.position.set(-8,2.4,-6.5);
  const carGreen = new THREE.Mesh(new THREE.SphereGeometry(0.18), new THREE.MeshStandardMaterial({color:0x004400,emissive:0x002200})); carGreen.position.set(-8,1.7,-6.5);
  carLight.add(carRed); carLight.add(carAmber); carLight.add(carGreen);
  scene.add(carLight);

  const lights = {ped:[pedLights1,pedLights2], car:{red:carRed, amber:carAmber, green:carGreen}};

  // Cars
  class Car{
    constructor(x,z,dir=1,color=0xff4444){
      const group = new THREE.Group();
      const body = new THREE.Mesh(new THREE.BoxGeometry(2,0.7,1), new THREE.MeshStandardMaterial({color}));
      body.position.y = 0.4; group.add(body);
      group.position.set(x,0,z);
      group.userData = {width:2};
      scene.add(group);
      this.mesh = group; this.speed = 0.05*dir; this.dir = dir;
    }
    update(){
      this.mesh.position.x += this.speed;
      if(this.speed>0 && this.mesh.position.x>18) this.mesh.position.x = -18;
      if(this.speed<0 && this.mesh.position.x<-18) this.mesh.position.x = 18;
    }
  }

  const cars = [
    new Car(-12,-2,1,0xff4444),
    new Car(6,2,-1,0x44aaee)
  ];

  let score = 0; let playing=false;
  const scoreEl = document.getElementById('score');
  const msgEl = document.getElementById('message');

  function setMessage(txt,timeout=2000){
    msgEl.textContent = txt; msgEl.style.display='block';
    clearTimeout(msgEl._t);
    msgEl._t = setTimeout(()=> msgEl.style.display='none', timeout);
  }

  // Timers for pedestrian and car lights
  let pedState='red', pedTimer=0;
  let carState='green', carTimer=0;

  function setPedLight(state){
    pedState=state; pedTimer=0;
    for(const p of lights.ped){
      p.redMan.material.emissive.setHex(state==='red'?0xff0000:0x220000);
      p.greenMan.material.emissive.setHex(state==='green'?0x00ff00:0x002200);
    }
  }
  function setCarLight(state){
    carState=state; carTimer=0;
    lights.car.red.material.emissive.setHex(state==='red'?0xff0000:0x220000);
    lights.car.amber.material.emissive.setHex(state==='amber'?0xffaa00:0x222200);
    lights.car.green.material.emissive.setHex(state==='green'?0x00ff00:0x002200);
  }
  setPedLight('red'); setCarLight('green');

  document.getElementById('startBtn').addEventListener('click',()=>{
    playing=true; score=0; player.position.set(-9,0,-8);
    camera.position.set(-9,1.6,-8);
    setPedLight('red'); setCarLight('green');
    scoreEl.textContent=`Score: ${score}`;
    setMessage('Wait for green man');
  });
  document.getElementById('resetBtn').addEventListener('click',()=>{
    playing=false; score=0; scoreEl.textContent=`Score: ${score}`; setMessage('Reset');
  });

  const keys={};
  window.addEventListener('keydown',e=>keys[e.key]=true);
  window.addEventListener('keyup',e=>keys[e.key]=false);

  function checkCollision(){
    const px=player.position.x,pz=player.position.z;
    for(const c of cars){
      const dx=Math.abs(px-c.mesh.position.x);
      const dz=Math.abs(pz-c.mesh.position.z);
      if(dx<1.2 && dz<1.2) return true;
    }
    return false;
  }

  function checkGoal(){
    if(player.position.z>6){
      score++; scoreEl.textContent=`Score: ${score}`;
      setMessage('Great! You crossed safely.');
      player.position.set(-9,0,-8); camera.position.set(-9,1.6,-8);
    }
  }

  const clock=new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    const dt=clock.getDelta();

    if(playing){
      // Pedestrian light cycle: red 20s, green 20s
      pedTimer+=dt;
      if(pedState==='red' && pedTimer>20){ setPedLight('green'); setMessage('Green man! Cross now'); }
      if(pedState==='green' && pedTimer>20){ setPedLight('red'); setMessage('Red man — wait'); }

      // Car light cycle: green 10s, amber 3s, red 7s
      carTimer+=dt;
      if(carState==='green' && carTimer>10){ setCarLight('amber'); }
      else if(carState==='amber' && carTimer>3){ setCarLight('red'); }
      else if(carState==='red' && carTimer>7){ setCarLight('green'); }

      // Cars move when car light green or amber
      for(const c of cars){
        if(carState==='red') continue;
        c.update();
      }

      const speed=5*dt;
      if(keys['ArrowLeft']){player.position.x-=speed; camera.position.x-=speed;}
      if(keys['ArrowRight']){player.position.x+=speed; camera.position.x+=speed;}
      if(keys['ArrowUp']){player.position.z+=speed; camera.position.z+=speed;}
      if(keys['ArrowDown']){player.position.z-=speed; camera.position.z-=speed;}

      if(pedState==='red' && player.position.z>-3 && player.position.z<3){
        setMessage('It is red man — stop!');
      }

      if(checkCollision()){
        setMessage('Oops! Car hit you — try again',2500);
        player.position.set(-9,0,-8); camera.position.set(-9,1.6,-8);
        score=Math.max(0,score-1); scoreEl.textContent=`Score: ${score}`;
      }

      checkGoal();
    }

    renderer.render(scene,camera);
  }
  animate();

  window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });

  setTimeout(()=>setMessage('Press Start, watch the green man!'),400);
  </script>
</body>
</html>
