<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tiny Text Expander — Options</title>
    <style>
      body { font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; }
      textarea { width: 100%; height: 260px; }
      .row { display:flex; gap:8px; margin-top:8px; align-items:center; }
      button { padding:8px 12px; }
      code { background:#f4f4f4; padding:2px 6px; border-radius:6px; }
    </style>
  </head>
  <body>
    <h1>Tiny Text Expander</h1>
    <p>Store your snippets as a simple JSON map, e.g. <code>{ ";br": "Best regards," }</code>.</p>
    <textarea id="box" spellcheck="false"></textarea>
    <div class="row">
      <button id="save">Save</button>
      <button id="prettify">Prettify</button>
      <span id="msg"></span>
    </div>
    <p>Tip: Type your shortcut and then press space/enter (or use <strong>Alt+E</strong>) to expand.</p>
    <script src="options.js"></script>
  </body>
</html>
