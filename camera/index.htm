<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Snapshot & QR Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230f172a'/%3E%3Ccircle cx='50' cy='50' r='30' stroke='%233b82f6' stroke-width='8' fill='none'/%3E%3Ccircle cx='50' cy='50' r='14' fill='%233b82f6'/%3E%3Ccircle cx='70' cy='30' r='6' fill='%2310b981'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #334155;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #10b981;
      --success-hover: #059669;
      --warning: #f59e0b;
      --border: #475569;
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      padding: 12px;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* Container for the page contents to cap on wider screens but stay mobile-friendly */
    .app-container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header area */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo {
      display: block;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 800;
      margin: 0;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    /* Live Status indicator */
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      background: var(--bg-secondary);
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }
    .status-indicator p {
      margin: 0;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .pulse-dot {
      width: 8px;
      height: 8px;
      background-color: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
      animation: pulse 1.5s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
      }
      70% {
        transform: scale(1);
        box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
      }
    }

    /* Video & Overlay Viewport */
    #container {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 500px;
      background: #000;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 2px solid var(--border);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }
    video {
      width: 100%;
      display: block;
      border-radius: inherit;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Quick Stats & Info overlays */
    .viewport-overlays {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .badge {
      font-size: 0.75rem;
      font-weight: 700;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .badge.warning {
      border-color: var(--warning);
      color: var(--warning);
    }
    .badge:empty {
      display: none;
    }

    /* Actions Panel */
    .controls-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s ease-in-out;
    }
    .btn:active {
      transform: scale(0.97);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      grid-column: span 2;
      font-size: 1.1rem;
      padding: 14px;
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }
    .btn-primary:disabled {
      background: var(--bg-card);
      color: var(--text-secondary);
      cursor: not-allowed;
    }
    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: var(--bg-card);
    }

    /* Debug Details Panel */
    details.debug-details {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .debug-summary {
      padding: 10px 14px;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      list-style: none;
    }
    .debug-summary::-webkit-details-marker {
      display: none;
    }
    details[open] .summary-icon {
      transform: rotate(180deg);
    }
    .summary-icon {
      transition: transform 0.2s ease;
    }
    .debug-content {
      border-top: 1px solid var(--border);
      padding: 6px;
    }
    #debugConsole {
      width: 100%;
      height: 120px;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 11px;
      resize: none;
      outline: none;
      box-sizing: border-box;
    }

    /* Captured Items List */
    .snapshots-section {
      margin-top: 8px;
    }
    .section-title {
      font-size: 1.1rem;
      font-weight: 800;
      margin: 0 0 12px;
      color: var(--text-primary);
      border-bottom: 2px solid var(--bg-secondary);
      padding-bottom: 6px;
    }
    .snapshots {
      display: flex;
      flex-direction: column;
    }

    /* Snapshot Cards */
    .snapshot-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .snapshot-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .snapshot-title-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .snapshot-badge {
      font-size: 0.7rem;
      font-weight: 750;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      letter-spacing: 0.05em;
    }
    .qr-badge {
      background: var(--success);
      color: #fff;
    }
    .crowd-badge {
      background: var(--accent);
      color: #fff;
    }
    .snapshot-time {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .btn-delete {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      transition: color 0.15s;
    }
    .btn-delete:hover, .btn-delete:active {
      color: var(--danger);
    }
    .snapshot-body {
      display: flex;
      gap: 12px;
    }
    .snapshot-preview {
      flex-shrink: 0;
      width: 90px;
      height: auto;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: #000;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
    }
    .snapshot-preview canvas {
      width: 100%;
      height: auto;
      display: block;
    }
    .snapshot-details {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--text-primary);
      min-width: 0;
    }
    .snapshot-data {
      line-height: 1.4;
      word-break: break-word;
    }
    .snapshot-data strong {
      color: var(--text-primary);
    }
    .snapshot-data a {
      color: #60a5fa;
      text-decoration: underline;
      font-weight: 600;
    }
    .snapshot-data a:hover, .snapshot-data a:active {
      color: var(--accent);
    }
    .snapshot-data.processing {
      color: var(--text-secondary);
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .snapshot-data.processing::before {
      content: '';
      width: 12px;
      height: 12px;
      border: 2px solid var(--text-secondary);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .snapshot-actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }
    .btn-action-download {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-primary);
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-action-download:hover, .btn-action-download:active {
      background: var(--border);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-left">
        <svg class="header-logo" viewBox="0 0 100 100" width="28" height="28">
          <circle cx="50" cy="50" r="40" stroke="#3b82f6" stroke-width="6" fill="none" />
          <circle cx="50" cy="50" r="14" fill="#3b82f6" />
          <circle cx="70" cy="30" r="6" fill="#10b981" />
        </svg>
        <h1>Snap & Scan</h1>
      </div>
      <div class="status-indicator">
        <span class="pulse-dot"></span>
        <p id="log">Initializing...</p>
      </div>
    </header>

    <main class="app-main" style="display: flex; flex-direction: column; gap: 16px;">
      <!-- Camera Viewport -->
      <div>
        <div id="container">
          <video id="video" autoplay muted playsinline></video>
          <canvas id="overlay"></canvas>
        </div>

        <!-- Live indicators -->
        <div class="viewport-overlays">
          <div id="counters" class="badge">QR Codes: 0</div>
          <div id="analysisStatus" class="badge warning">Loading ML Models...</div>
        </div>
      </div>

      <!-- Controls Panel -->
      <div class="controls-panel">
        <div class="button-grid">
          <button id="snapBtn" class="btn btn-primary" disabled>
            <span class="btn-icon">📸</span>
            <span class="btn-text">Take Snapshot</span>
          </button>
          <button id="clearSnapshotsBtn" class="btn btn-secondary">
            <span class="btn-icon">🧹</span>
            <span class="btn-text">Clear All</span>
          </button>
          <button id="toggleQRBtn" class="btn btn-secondary">
            <span id="toggleQRIcon" class="btn-icon">🔍</span>
            <span id="toggleQRText" class="btn-text">QR: On</span>
          </button>
          <button id="pauseBtn" class="btn btn-secondary">
            <span id="pauseIcon" class="btn-icon">⏸️</span>
            <span id="pauseText" class="btn-text">Pause</span>
          </button>
        </div>
      </div>

      <!-- Collapsible Debug Console -->
      <details open class="debug-details">
        <summary class="debug-summary">
          <span class="summary-text">Debug & System Logs</span>
          <span class="summary-icon">▼</span>
        </summary>
        <div class="debug-content">
          <textarea id="debugConsole" readonly placeholder="Debug logs will appear here..."></textarea>
        </div>
      </details>

      <!-- Snapshots list -->
      <section class="snapshots-section">
        <h2 class="section-title">Captured Items</h2>
        <div class="snapshots" id="snapshots"></div>
      </section>
    </main>
  </div>

  <script>
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const ctx = overlay.getContext('2d');
    const logPara = document.getElementById('log');
    const snapshotsContainer = document.getElementById('snapshots');
    const pauseBtn = document.getElementById('pauseBtn');
    const toggleQRBtn = document.getElementById('toggleQRBtn');
    const clearSnapshotsBtn = document.getElementById('clearSnapshotsBtn');
    const snapBtn = document.getElementById('snapBtn');
    const analysisStatus = document.getElementById('analysisStatus');
    const counters = document.getElementById('counters');
    const debugConsole = document.getElementById('debugConsole');

    function debugLog(msg) {
      const timestamp = new Date().toLocaleTimeString();
      debugConsole.value = `[${timestamp}] ${msg}\n` + debugConsole.value;
      console.log(msg);
    }

    // Capture global errors
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      debugLog(`GLOBAL ERROR: ${msg} at ${lineNo}:${columnNo}`);
      return false;
    };

    let scanning = true;
    let mlModelsLoaded = false;
    let cocoModel = null;
    const analysisQueue = [];
    let isProcessingQueue = false;

    async function loadModels() {
      try {
        debugLog('Starting model load...');
        snapBtn.disabled = true;
        
        analysisStatus.textContent = 'Configuring WebGL...';
        if (typeof faceapi !== 'undefined' && faceapi.tf && faceapi.tf.setBackend) {
          await faceapi.tf.setBackend('webgl');
          await faceapi.tf.ready();
        }
        if (typeof tf !== 'undefined' && tf.setBackend) {
          await tf.setBackend('webgl');
          await tf.ready();
        }

        analysisStatus.textContent = 'Loading Coco-SSD...';
        cocoModel = await cocoSsd.load();
        debugLog('Coco-SSD loaded.');
        
        analysisStatus.textContent = 'Loading Face-API...';
        await faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
        await faceapi.nets.ageGenderNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
        debugLog('Face-API loaded.');
        
        mlModelsLoaded = true;
        analysisStatus.textContent = 'ML Models Ready.';
        snapBtn.disabled = false;
        debugLog('All models ready.');
        processQueue();
        setTimeout(() => { if (analysisQueue.length === 0) analysisStatus.textContent = ''; }, 3000);
      } catch (err) {
        debugLog(`ERROR loading models: ${err.message}`);
        analysisStatus.textContent = 'Failed to load ML models.';
      }
    }
    loadModels();

    function getAgeGroup(age) {
      if (age < 13) return 'Child';
      if (age < 20) return 'Teen';
      if (age < 60) return 'Adult';
      return 'Senior';
    }

    function updateQueueStatus() {
      if (analysisQueue.length > 0) {
        analysisStatus.textContent = `Queue: ${analysisQueue.length} pending...`;
      } else if (isProcessingQueue) {
        analysisStatus.textContent = 'Processing analysis...';
      } else {
        analysisStatus.textContent = mlModelsLoaded ? '' : 'Loading ML Models...';
      }
    }

    async function processQueue() {
      if (isProcessingQueue || analysisQueue.length === 0 || !mlModelsLoaded) return;

      isProcessingQueue = true;
      updateQueueStatus();

      const task = analysisQueue.shift();
      const { type, canvas, resultContainer } = task;

      try {
        if (type === 'crowd') {
          debugLog('Analyzing crowd snapshot...');
          const [predictions, faces] = await Promise.all([
            cocoModel.detect(canvas),
            faceapi.detectAllFaces(canvas).withAgeAndGender()
          ]);

          const people = predictions.filter(p => p.class === 'person');
          const snapCtx = canvas.getContext('2d');
          
          snapCtx.lineWidth = 3;
          snapCtx.font = '16px Arial';
          people.forEach(person => {
            snapCtx.strokeStyle = '#ff0000';
            snapCtx.strokeRect(...person.bbox);
          });

          let maleCount = 0;
          let femaleCount = 0;
          faces.forEach(face => {
            const { x, y, width, height } = face.detection.box;
            snapCtx.strokeStyle = '#00ff00';
            snapCtx.strokeRect(x, y, width, height);

            const ageGroup = getAgeGroup(face.age);
            if (face.gender === 'male') maleCount++;
            else femaleCount++;

            const label = `${face.gender} (${ageGroup})`;
            snapCtx.fillStyle = '#00ff00';
            snapCtx.fillText(label, x, y > 20 ? y - 5 : y + 20);
          });

          resultContainer.innerHTML = `
            <div style="font-weight: 700; margin-bottom: 6px; color: var(--text-primary);">Crowd Analysis</div>
            <div style="display: flex; flex-wrap: wrap; gap: 6px;">
              <span class="badge" style="background: rgba(59, 130, 246, 0.15); border-color: rgba(59, 130, 246, 0.3); color: #93c5fd; padding: 4px 8px;">👥 People: ${people.length}</span>
              <span class="badge" style="background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.3); color: #6ee7b7; padding: 4px 8px;">👤 Faces: ${faces.length}</span>
              <span class="badge" style="background: rgba(245, 158, 11, 0.15); border-color: rgba(245, 158, 11, 0.3); color: #fcd34d; padding: 4px 8px;">♂️ ${maleCount}M / ♀️ ${femaleCount}F</span>
            </div>
          `;
          resultContainer.classList.remove('processing');

          const displayCanvas = resultContainer.closest('.snapshot-card').querySelector('.snapshot-preview canvas');
          if (displayCanvas) {
            displayCanvas.getContext('2d').drawImage(canvas, 0, 0, displayCanvas.width, displayCanvas.height);
          }

          // Add a download button to the crowd snapshot after analysis
          const downloadBtn = document.createElement('a');
          downloadBtn.className = 'btn-action-download';
          downloadBtn.innerHTML = '📥 Download';
          downloadBtn.href = canvas.toDataURL('image/png');
          downloadBtn.download = `Crowd-Analysis-${Date.now()}.png`;
          const actionsContainer = resultContainer.closest('.snapshot-card').querySelector('.snapshot-actions');
          if (actionsContainer) {
            actionsContainer.innerHTML = '';
            actionsContainer.appendChild(downloadBtn);
          }

          debugLog(`Analysis complete: Found ${people.length} people.`);
        }
      } catch (err) {
        debugLog(`Analysis error: ${err.message}`);
        resultContainer.innerHTML = 'Analysis failed.';
        resultContainer.classList.remove('processing');
      } finally {
        isProcessingQueue = false;
        updateQueueStatus();
        setTimeout(processQueue, 10);
      }
    }

    function addToQueue(task) {
      analysisQueue.push(task);
      updateQueueStatus();
      processQueue();
    }

    snapBtn.addEventListener('click', () => {
      debugLog('Take Snapshot clicked');
      if (!video.videoWidth) {
        debugLog('ERROR: videoWidth is 0. Is camera ready?');
        return;
      }

      try {
        const snapCanvas = document.createElement('canvas');
        snapCanvas.width = video.videoWidth;
        snapCanvas.height = video.videoHeight;
        const snapCtx = snapCanvas.getContext('2d');
        snapCtx.drawImage(video, 0, 0, snapCanvas.width, snapCanvas.height);

        const container = document.createElement('div');
        container.className = 'snapshot-card';
        container.setAttribute('data-type', 'crowd');
        const timestamp = new Date().toLocaleTimeString();

        container.innerHTML = `
          <div class="snapshot-header">
            <div class="snapshot-title-group">
              <span class="snapshot-badge crowd-badge">Snapshot</span>
              <span class="snapshot-time">${timestamp}</span>
            </div>
            <button class="btn-delete" title="Delete snapshot">✕</button>
          </div>
          <div class="snapshot-body">
            <div class="snapshot-preview"></div>
            <div class="snapshot-details">
              <div class="snapshot-data processing">Queued for analysis...</div>
              <div class="snapshot-actions"></div>
            </div>
          </div>
        `;

        const displayCanvas = document.createElement('canvas');
        displayCanvas.width = snapCanvas.width / 2;
        displayCanvas.height = snapCanvas.height / 2;
        displayCanvas.getContext('2d').drawImage(snapCanvas, 0, 0, displayCanvas.width, displayCanvas.height);

        container.querySelector('.snapshot-preview').appendChild(displayCanvas);

        // Add delete listener
        container.querySelector('.btn-delete').addEventListener('click', () => {
          container.remove();
          debugLog('Snapshot deleted');
        });

        snapshotsContainer.prepend(container);
        debugLog('Snapshot captured and added to list');

        addToQueue({
          type: 'crowd',
          canvas: snapCanvas,
          resultContainer: container.querySelector('.snapshot-data')
        });
      } catch (err) {
        debugLog(`ERROR capturing snapshot: ${err.message}`);
      }
    });

    let detectQRs = true;
    let qrCount = 0;
    let isDetectLoopRunning = false;
    const seenQRCodes = new Set();

    pauseBtn.addEventListener('click', () => {
      scanning = !scanning;
      debugLog(`Pause clicked. scanning=${scanning}`);
      const pauseText = document.getElementById('pauseText');
      const pauseIcon = document.getElementById('pauseIcon');
      if (pauseText) pauseText.textContent = scanning ? 'Pause' : 'Resume';
      if (pauseIcon) pauseIcon.textContent = scanning ? '⏸️' : '▶️';
      if (scanning && !isDetectLoopRunning) detectLoop();
    });

    toggleQRBtn.addEventListener('click', () => {
      detectQRs = !detectQRs;
      debugLog(`Toggle QR clicked. detectQRs=${detectQRs}`);
      const toggleQRText = document.getElementById('toggleQRText');
      const toggleQRIcon = document.getElementById('toggleQRIcon');
      if (toggleQRText) toggleQRText.textContent = `QR: ${detectQRs ? 'On' : 'Off'}`;
      if (toggleQRIcon) toggleQRIcon.textContent = detectQRs ? '🔍' : '🚫';
    });

    clearSnapshotsBtn.addEventListener('click', () => {
      debugLog('Clear clicked');
      snapshotsContainer.innerHTML = '';
      seenQRCodes.clear();
      qrCount = 0;
      updateCounters();
      analysisQueue.length = 0;
      updateQueueStatus();
    });

    function updateCounters() {
      counters.textContent = `QR Codes: ${qrCount}`;
    }

    async function setupCamera() {
      try {
        debugLog('Setting up camera...');
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          debugLog(`Camera metadata loaded: ${video.videoWidth}x${video.videoHeight}`);
          overlay.width = video.videoWidth;
          overlay.height = video.videoHeight;
          if (!isDetectLoopRunning) detectLoop();
        };
      } catch (err) {
        logPara.textContent = 'Camera access denied or not supported.';
        debugLog(`ERROR setupCamera: ${err.message}`);
      }
    }

    function captureQRSnapshot(label, box) {
      const canvas = document.createElement('canvas');
      canvas.width = box.width;
      canvas.height = box.height;
      const context = canvas.getContext('2d');
      context.drawImage(video, box.x, box.y, box.width, box.height, 0, 0, box.width, box.height);

      const container = document.createElement('div');
      container.className = 'snapshot-card';
      container.setAttribute('data-type', 'qr');

      const timestamp = new Date().toLocaleTimeString();

      container.innerHTML = `
        <div class="snapshot-header">
          <div class="snapshot-title-group">
            <span class="snapshot-badge qr-badge">QR Code</span>
            <span class="snapshot-time">${timestamp}</span>
          </div>
          <button class="btn-delete" title="Delete snapshot">✕</button>
        </div>
        <div class="snapshot-body">
          <div class="snapshot-preview"></div>
          <div class="snapshot-details">
            <div class="snapshot-data">
              ${label}
            </div>
            <div class="snapshot-actions">
            </div>
          </div>
        </div>
      `;

      // Append canvas
      container.querySelector('.snapshot-preview').appendChild(canvas);

      // Download button
      const downloadBtn = document.createElement('a');
      downloadBtn.className = 'btn-action-download';
      downloadBtn.innerHTML = '📥 Download';
      downloadBtn.href = canvas.toDataURL('image/png');
      downloadBtn.download = `${label.replace(/<[^>]*>/g, '')}-${Date.now()}.png`;
      container.querySelector('.snapshot-actions').appendChild(downloadBtn);

      // Add delete listener
      container.querySelector('.btn-delete').addEventListener('click', () => {
        container.remove();
        debugLog('Snapshot deleted');
      });

      snapshotsContainer.prepend(container);
      debugLog(`QR captured: ${label.replace(/<[^>]*>/g, '')}`);
    }

    async function detectLoop() {
      if (isDetectLoopRunning) return;
      isDetectLoopRunning = true;
      debugLog('Detect loop started');

      const barcodeDetector = ('BarcodeDetector' in window) ? new BarcodeDetector({ formats: ['qr_code'] }) : null;
      if (!barcodeDetector) debugLog('BarcodeDetector NOT supported');

      const detect = async () => {
        if (!scanning) {
          isDetectLoopRunning = false;
          debugLog('Detect loop stopping (paused)');
          return;
        }

        ctx.clearRect(0, 0, overlay.width, overlay.height);
        let newInfo = [];

        try {
          if (barcodeDetector && detectQRs) {
            const barcodes = await barcodeDetector.detect(video);
            barcodes.forEach(code => {
              const { x, y, width, height } = code.boundingBox;
              ctx.strokeStyle = '#10b981'; // match success brand color
              ctx.lineWidth = 3;
              ctx.strokeRect(x, y, width, height);
              ctx.fillStyle = '#10b981';
              ctx.font = 'bold 14px var(--font-sans)';
              ctx.fillText('QR Detected', x, y - 10);

              if (!seenQRCodes.has(code.rawValue)) {
                seenQRCodes.add(code.rawValue);
                qrCount++;
                const urlPattern = /^(https?:\/\/)?([\w.-]+)\.([a-z\.]{2,6})([\/\w .-]*)*\/?$/i;
                const link = urlPattern.test(code.rawValue) ?
                  code.rawValue.startsWith('http') ? code.rawValue : 'https://' + code.rawValue :
                  `https://www.google.com/search?q=${encodeURIComponent(code.rawValue)}`;
                captureQRSnapshot(`<a href="${link}" target="_blank">QR: ${code.rawValue}</a>`, {x, y, width, height});
                newInfo.push(`QR: ${code.rawValue}`);
              }
            });
          }
        } catch (err) {
          console.error('Detection error:', err);
        }

        if (newInfo.length > 0) logPara.textContent = `Scanning... ${newInfo.join(', ')}`;
        else logPara.textContent = `Scanning...`;

        updateCounters();
        if (scanning) requestAnimationFrame(detect);
        else isDetectLoopRunning = false;
      };

      detect();
    }

    setupCamera();
  </script>
</body>
</html>
