<!DOCTYPE html>
<html>
<head>
  <title>Face & QR Scanner with Snapshots</title>
  <style>
    video { width: 50%; border: 1px solid #ccc; }
    canvas { max-width: 100%; border: 1px solid #ccc; }
    #overlay { position: absolute; top: 0; left: 0; }
    #container { position: relative; display: inline-block; }
    .snapshots { margin-top: 20px; }
    .snapshot { margin: 10px 0; border: 1px solid #ccc; padding: 5px; }
    button { margin-top: 10px; margin-right: 10px; font-size: 1.5em; padding: 10px 20px; }
    #controls { margin-top: 10px; }
    #analyzeBtn { background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; transition: background-color 0.3s ease; }
    #analyzeBtn:hover { background-color: #0056b3; }
    #analyzeBtn:disabled { background-color: #ccc; cursor: not-allowed; }
    .analysis-status { font-weight: bold; color: #555; margin-left: 10px; }
    .snapshot-data { font-size: 0.9em; color: #333; margin-top: 5px; background: #f9f9f9; padding: 5px; border-radius: 4px; }
    .processing { color: #888; font-style: italic; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
</head>
<body>
  <h1>Face & QR Scanner with Snapshots</h1>
  <div id="container">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>
  <p id="log">Initializing...</p>
  <p id="counters"></p>
  <div id="controls">
    <button id="pauseBtn">Pause</button>
    <button id="toggleFaceBtn">Toggle Face Detection (On)</button>
    <button id="toggleQRBtn">Toggle QR Detection (On)</button>
    <button id="clearSnapshotsBtn">Clear Snapshots</button>
    <br><br>
    <button id="analyzeBtn">📸 Analyze Crowd (Snapshot)</button>
    <span id="analysisStatus" class="analysis-status">Loading ML Models...</span>
  </div>
  <div class="snapshots" id="snapshots"></div>

  <script>
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const ctx = overlay.getContext('2d');
    const log = document.getElementById('log');
    const snapshotsContainer = document.getElementById('snapshots');
    const pauseBtn = document.getElementById('pauseBtn');
    const toggleFaceBtn = document.getElementById('toggleFaceBtn');
    const toggleQRBtn = document.getElementById('toggleQRBtn');
    const clearSnapshotsBtn = document.getElementById('clearSnapshotsBtn');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const analysisStatus = document.getElementById('analysisStatus');
    const counters = document.getElementById('counters');

    let scanning = true;
    let mlModelsLoaded = false;
    let cocoModel = null;
    const analysisQueue = [];
    let isProcessingQueue = false;

    // Initialize ML Models
    async function loadModels() {
      try {
        analyzeBtn.disabled = true;
        
        analysisStatus.textContent = 'Configuring WebGL...';
        if (typeof faceapi !== 'undefined' && faceapi.tf && faceapi.tf.setBackend) {
          await faceapi.tf.setBackend('webgl');
          await faceapi.tf.ready();
        }
        if (typeof tf !== 'undefined' && tf.setBackend) {
          await tf.setBackend('webgl');
          await tf.ready();
        }

        analysisStatus.textContent = 'Loading Coco-SSD...';
        cocoModel = await cocoSsd.load();
        
        analysisStatus.textContent = 'Loading Face-API...';
        await faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
        await faceapi.nets.ageGenderNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
        
        mlModelsLoaded = true;
        analysisStatus.textContent = 'ML Models Ready.';
        analyzeBtn.disabled = false;
        processQueue(); // Start processing if anything was queued while loading
        setTimeout(() => { if (analysisQueue.length === 0) analysisStatus.textContent = ''; }, 3000);
      } catch (err) {
        console.error('Error loading models:', err);
        analysisStatus.textContent = 'Failed to load ML models.';
      }
    }
    loadModels();

    function getAgeGroup(age) {
      if (age < 13) return 'Child';
      if (age < 20) return 'Teen';
      if (age < 60) return 'Adult';
      return 'Senior';
    }

    function updateQueueStatus() {
      if (analysisQueue.length > 0) {
        analysisStatus.textContent = `Queue: ${analysisQueue.length} pending...`;
      } else if (isProcessingQueue) {
        analysisStatus.textContent = 'Processing analysis...';
      } else {
        analysisStatus.textContent = mlModelsLoaded ? '' : 'Loading ML Models...';
      }
    }

    async function processQueue() {
      if (isProcessingQueue || analysisQueue.length === 0 || !mlModelsLoaded) return;

      isProcessingQueue = true;
      updateQueueStatus();

      const task = analysisQueue.shift();
      const { type, canvas, resultContainer } = task;

      try {
        if (type === 'crowd') {
          const [predictions, faces] = await Promise.all([
            cocoModel.detect(canvas),
            faceapi.detectAllFaces(canvas).withAgeAndGender()
          ]);

          const people = predictions.filter(p => p.class === 'person');
          const snapCtx = canvas.getContext('2d');
          
          snapCtx.lineWidth = 3;
          snapCtx.font = '16px Arial';
          people.forEach(person => {
            snapCtx.strokeStyle = '#ff0000';
            snapCtx.strokeRect(...person.bbox);
          });

          let maleCount = 0;
          let femaleCount = 0;
          faces.forEach(face => {
            const { x, y, width, height } = face.detection.box;
            snapCtx.strokeStyle = '#00ff00';
            snapCtx.strokeRect(x, y, width, height);

            const ageGroup = getAgeGroup(face.age);
            if (face.gender === 'male') maleCount++;
            else femaleCount++;

            const label = `${face.gender} (${ageGroup})`;
            snapCtx.fillStyle = '#00ff00';
            snapCtx.fillText(label, x, y > 20 ? y - 5 : y + 20);
          });

          resultContainer.innerHTML = `
            <strong>Crowd Analysis</strong><br>
            People (Bodies): ${people.length}<br>
            Faces Detected: ${faces.length}<br>
            Demographics: ${maleCount} Male, ${femaleCount} Female
          `;
          resultContainer.classList.remove('processing');

          const displayCanvas = resultContainer.parentElement.querySelector('canvas');
          if (displayCanvas) {
            displayCanvas.getContext('2d').drawImage(canvas, 0, 0, displayCanvas.width, displayCanvas.height);
          }

        } else if (type === 'face') {
          const face = await faceapi.detectSingleFace(canvas).withAgeAndGender();
          const snapCtx = canvas.getContext('2d');

          if (face) {
            const { x, y, width, height } = face.detection.box;
            snapCtx.strokeStyle = '#00ff00';
            snapCtx.lineWidth = 3;
            snapCtx.strokeRect(x, y, width, height);

            const ageGroup = getAgeGroup(face.age);
            const label = `${face.gender} (${ageGroup})`;
            snapCtx.fillStyle = '#00ff00';
            snapCtx.font = '16px Arial';
            snapCtx.fillText(label, 5, 20);

            resultContainer.innerHTML = `Face: ${label}, Age: ${Math.round(face.age)}`;
          } else {
            resultContainer.innerHTML = `Face: Detected but analysis failed.`;
          }
          resultContainer.classList.remove('processing');

          const displayCanvas = resultContainer.parentElement.querySelector('canvas');
          if (displayCanvas) {
            displayCanvas.getContext('2d').drawImage(canvas, 0, 0, displayCanvas.width, displayCanvas.height);
          }
        }
      } catch (err) {
        console.error('Analysis error:', err);
        resultContainer.innerHTML = 'Analysis failed.';
        resultContainer.classList.remove('processing');
      } finally {
        isProcessingQueue = false;
        updateQueueStatus();
        // Use setTimeout to yield to the event loop before processing next item
        setTimeout(processQueue, 10);
      }
    }

    function addToQueue(task) {
      analysisQueue.push(task);
      updateQueueStatus();
      processQueue();
    }

    analyzeBtn.addEventListener('click', () => {
      if (!video.videoWidth) return;

      const snapCanvas = document.createElement('canvas');
      snapCanvas.width = video.videoWidth;
      snapCanvas.height = video.videoHeight;
      const snapCtx = snapCanvas.getContext('2d');
      snapCtx.drawImage(video, 0, 0, snapCanvas.width, snapCanvas.height);

      const container = document.createElement('div');
      container.className = 'snapshot';
      const timestamp = new Date().toLocaleString();

      const infoHtml = `<div class="snapshot-data processing">Queued for Crowd Analysis...</div>`;
      container.innerHTML = `<strong>Manual Snapshot</strong><br>${timestamp}<br>${infoHtml}`;

      const displayCanvas = document.createElement('canvas');
      displayCanvas.width = snapCanvas.width / 2;
      displayCanvas.height = snapCanvas.height / 2;
      displayCanvas.getContext('2d').drawImage(snapCanvas, 0, 0, displayCanvas.width, displayCanvas.height);

      container.appendChild(displayCanvas);
      snapshotsContainer.prepend(container);

      addToQueue({
        type: 'crowd',
        canvas: snapCanvas,
        resultContainer: container.querySelector('.snapshot-data')
      });
    });

    let detectFaces = true;
    let detectQRs = true;
    let faceCount = 0;
    let qrCount = 0;
    let isDetectLoopRunning = false;

    const seenQRCodes = new Set();
    const seenFaces = [];

    pauseBtn.addEventListener('click', () => {
      scanning = !scanning;
      pauseBtn.textContent = scanning ? 'Pause' : 'Resume';
      if (scanning && !isDetectLoopRunning) detectLoop();
    });

    toggleFaceBtn.addEventListener('click', () => {
      detectFaces = !detectFaces;
      toggleFaceBtn.textContent = `Toggle Face Detection (${detectFaces ? 'On' : 'Off'})`;
    });

    toggleQRBtn.addEventListener('click', () => {
      detectQRs = !detectQRs;
      toggleQRBtn.textContent = `Toggle QR Detection (${detectQRs ? 'On' : 'Off'})`;
    });

    clearSnapshotsBtn.addEventListener('click', () => {
      snapshotsContainer.innerHTML = '';
      seenFaces.length = 0;
      seenQRCodes.clear();
      faceCount = 0;
      qrCount = 0;
      updateCounters();
      analysisQueue.length = 0;
      updateQueueStatus();
    });

    function updateCounters() {
      counters.textContent = `Faces: ${faceCount}, QR Codes: ${qrCount}`;
    }

    async function setupCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          overlay.width = video.videoWidth;
          overlay.height = video.videoHeight;
          if (!isDetectLoopRunning) detectLoop();
        };
      } catch (err) {
        log.textContent = 'Camera access denied or not supported.';
        console.error(err);
      }
    }

    function isSimilarFace(newFace) {
      return seenFaces.some(f =>
        Math.abs(f.x - newFace.x) < 50 &&
        Math.abs(f.y - newFace.y) < 50 &&
        Math.abs(f.width - newFace.width) < 50 &&
        Math.abs(f.height - newFace.height) < 50
      );
    }

    function captureSnapshot(label, box, triggerAnalysis = false) {
      const canvas = document.createElement('canvas');
      const padding = triggerAnalysis ? 20 : 0;
      const x = Math.max(0, box.x - padding);
      const y = Math.max(0, box.y - padding);
      const w = Math.min(video.videoWidth - x, box.width + padding * 2);
      const h = Math.min(video.videoHeight - y, box.height + padding * 2);

      canvas.width = w;
      canvas.height = h;
      const context = canvas.getContext('2d');
      context.drawImage(video, x, y, w, h, 0, 0, w, h);

      const container = document.createElement('div');
      container.className = 'snapshot';
      const timestamp = new Date().toLocaleString();

      let analysisInfo = '';
      if (triggerAnalysis) {
        analysisInfo = `<div class="snapshot-data processing">Queued for Face Analysis...</div>`;
      }

      container.innerHTML = `<strong>${label}</strong><br>${timestamp}<br>${analysisInfo}`;

      const downloadBtn = document.createElement('a');
      downloadBtn.textContent = 'Download';
      downloadBtn.href = canvas.toDataURL('image/png');
      downloadBtn.download = `${label.replace(/<[^>]*>/g, '')}-${Date.now()}.png`;
      downloadBtn.style.display = 'block';
      downloadBtn.style.marginTop = '5px';

      container.appendChild(canvas);
      container.appendChild(downloadBtn);
      snapshotsContainer.prepend(container);

      if (triggerAnalysis) {
        addToQueue({
          type: 'face',
          canvas: canvas,
          resultContainer: container.querySelector('.snapshot-data')
        });
      }
    }

    async function detectLoop() {
      if (isDetectLoopRunning) return;
      isDetectLoopRunning = true;

      const faceDetector = ('FaceDetector' in window) ? new FaceDetector({ fastMode: true }) : null;
      const barcodeDetector = ('BarcodeDetector' in window) ? new BarcodeDetector({ formats: ['qr_code'] }) : null;

      if (!faceDetector && !barcodeDetector) {
        log.textContent = 'Face and QR detection not supported in this browser.';
        isDetectLoopRunning = false;
        return;
      }

      const detect = async () => {
        if (!scanning) {
          isDetectLoopRunning = false;
          return;
        }

        ctx.clearRect(0, 0, overlay.width, overlay.height);
        let newInfo = [];

        try {
          if (faceDetector && detectFaces) {
            const faces = await faceDetector.detect(video);
            faces.forEach(face => {
              const box = face.boundingBox;
              ctx.strokeStyle = 'blue';
              ctx.lineWidth = 2;
              ctx.strokeRect(box.x, box.y, box.width, box.height);

              if (!isSimilarFace(box)) {
                // Throttle: Don't queue too many automatic faces if the queue is already long
                if (analysisQueue.length < 10) {
                  seenFaces.push(box);
                  faceCount++;
                  captureSnapshot('New Face Detected', box, true);
                  newInfo.push('Face');
                } else {
                  console.warn('Analysis queue full, skipping automatic face snapshot.');
                }
              }
            });
          }

          if (barcodeDetector && detectQRs) {
            const barcodes = await barcodeDetector.detect(video);
            barcodes.forEach(code => {
              const { x, y, width, height } = code.boundingBox;
              ctx.strokeStyle = 'green';
              ctx.lineWidth = 2;
              ctx.strokeRect(x, y, width, height);
              ctx.fillStyle = 'green';
              ctx.fillText(code.rawValue, x, y - 10);

              if (!seenQRCodes.has(code.rawValue)) {
                seenQRCodes.add(code.rawValue);
                qrCount++;
                const urlPattern = /^(https?:\/\/)?([\w.-]+)\.([a-z\.]{2,6})([\/\w .-]*)*\/?$/i;
                const link = urlPattern.test(code.rawValue) ?
                  code.rawValue.startsWith('http') ? code.rawValue : 'https://' + code.rawValue :
                  `https://www.google.com/search?q=${encodeURIComponent(code.rawValue)}`;
                captureSnapshot(`<a href="${link}" target="_blank">QR: ${code.rawValue}</a>`, {x, y, width, height}, false);
                newInfo.push(`QR: ${code.rawValue}`);
              }
            });
          }
        } catch (err) {
          console.error('Detection error:', err);
        }

        if (newInfo.length > 0) log.textContent = `Scanning... ${newInfo.join(', ')}`;
        else log.textContent = `Scanning...`;

        updateCounters();
        if (scanning) requestAnimationFrame(detect);
        else isDetectLoopRunning = false;
      };

      detect();
    }

    setupCamera();
  </script>
</body>
</html>
