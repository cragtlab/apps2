<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>10x Tracker</title>


<style>
body { font-family:sans-serif; padding:0px; background:#f5f5f5; }
.container { margin:auto; background:white; padding:5px; border-radius:10px; }

button { padding:8px 12px; margin:3px; cursor:pointer;border-radius:2px; }
.btn-danger { background:#ff4d4d; color:white; }
.btn-snooze { background:orange; color:white; }
.btn-add {    background:#28a745;color:white; }
#linkFreqContainer { display:none; gap:10px; margin-bottom:10px; }
#frequencyInput { width:30px; padding:8px }
#btn-update-url {    background:#007bff; color:white;border:none; }
textarea { width:100%; height:80px; }
#trackQueryContainer { display:none; margin-bottom:8px; }
#trackQueryTextarea { width:100%; height:90px; font-size:smaller; box-sizing:border-box; }
.track-search-links { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.track-search-links a { font-size:smaller; padding:2px 6px; border-radius:3px; color:white; text-decoration:none; }
.track-search-links a.g { background:#4285f4; }
.track-search-links a.r { background:#ff4500; }
.track-search-links a.x { background:#222; }

table { width:100%; border-collapse:collapse; margin-top:10px; }
td, th { font-size: smaller; border:1px solid #ddd; padding:6px; }
td button { padding: 4px}

#linkDisplay{
    text-overflow: ellipsis;
    overflow: hidden;
}
small  {
    display: block;
    overflow-wrap: anywhere;
}
#tickerInput { padding:8px; width:70px; text-transform:uppercase; }
</style>
</head>

<body>
<div class="container">
<b>10x Tracker - <a href="https://www.google.com/finance/beta/#research" target="_blank">GFinance</a> (open tab group in mobile)</b>

<!-- DISPLAY -->
<div id="linkFreqContainer">
    <input id="frequencyInput" placeholder="e.g. 2, W, M, Y">
    <a id="linkDisplay" target="_blank" style="flex:1;"></a>
      <input id="tickerInput" placeholder="ticker" oninput="saveCurrentTickerDraft()">
    <button onclick="window.open('https://www.google.com/finance/beta/quote/'+tickerInput.value)">Finance</button> 
    <button onclick="window.open('https://www.google.com/search?q=3 growth areas for '+tickerInput.value)">3 Growth</button>
    <button onclick="window.open('https://altindex.com/ticker/'+tickerInput.value.replace(/:.*$/,'').toLowerCase())">Altindex</button>
    <button onclick="window.open('https://x.com/search?q=%24'+tickerInput.value.replace(/:.*$/,'')+'&src=typeahead_click')">X</button>

</div>

<div id="titleEditorContainer" style="display:none;">
    <textarea id="titleTextarea" placeholder="enter remarks"></textarea>
</div>

  

<!-- Track: search queries textarea -->
<div id="trackQueryContainer">
    <label style="font-size:smaller;">Search queries (one per line):</label>
    <textarea id="trackQueryTextarea" placeholder="e.g. AAPL earnings&#10;AAPL reddit&#10;AAPL site:x.com" oninput="saveCurrentQueries()"></textarea>
    <div id="trackSearchLinks" class="track-search-links"></div>
  
</div>

<div id="buttonContainer" style="display:none;">
    <button class="btn-snooze" onclick="snoozeCurrentLink()">Snooze</button>
    <button class="btn-danger" onclick="deleteCurrentLink()">Delete</button>
    <button id="btn-update-url" onclick="updateCurrentURL()">Update URL only</button>
</div>

<!-- CONTROLS -->
 <hr>
 <small>To import from <a href="https://docs.google.com/spreadsheets/d/1U3TgM15sxkdGKnavT-LUGEFkLZGBOKKvTcOZ6EDPCB0/edit?gid=348733190#gid=348733190">10x Google Sheets</a>, click top left empty to select all then hold to copy</small>
<div>
    <button onclick="exportToClipboard()">Copy 10x</button>
    <button onclick="importFromClipboard()">Paste 10x</button>
    <button class="btn-add" onclick="addFromClipboard()">Add 10x</button>
    <button class="btn-add" onclick="addFromGoogleFinance()">Add from Goog / ticker</button>
    <input type="search"
    id="searchInput"
    placeholder="search..."
    oninput="updateLinksList()"
    style="padding:8px;width:140px;"
>

</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Ticker</th>
<th>Snoozed</th>
<th>Freq</th>
<th>Link</th>
</tr>
</thead>
<tbody id="linksTableBody"></tbody>
</table>

</div>

<script>
const STORAGE_KEY='10x_tracker';

let links=[];
let currentLink=null;

function isTrackItem(link){
    return !!(link && normalizeTicker(link.ticker));
}

function init(){
    loadLinks();
    displayNextAvailable();
    updateLinksList();
}

function loadLinks(){

    const stored = localStorage.getItem(STORAGE_KEY);

    if(stored){
        const parsed = JSON.parse(stored);

        if(Array.isArray(parsed)){
            // oldest format: plain array (all find items)
            links = parsed;
        }
        else if(Array.isArray(parsed.items)){
            // new format: { items: [...] }
            links = parsed.items;
        }
        else{
            // old format: { find: [...], track: [...] }
            const find = Array.isArray(parsed.find) ? parsed.find : [];
            const track = Array.isArray(parsed.track) ? parsed.track : [];
            links = [...find, ...track];
        }
    }
    else{
        links = [];
    }

    const changed = normalizeAllLinks();

    if(changed){
        saveLinks();
    }
}

function normalizeAllLinks(){

    let changed = false;

    links = links.map(link => {
        const normalized = {
            ...link,
            id: link.id || Date.now() + Math.floor(Math.random() * 1000000),
            ticker: normalizeTicker(link.ticker),
            snoozed_until: normalizeSnoozedUntil(link.snoozed_until)
        };

        if(normalized.id !== link.id ||
           normalized.ticker !== link.ticker ||
           normalized.snoozed_until !== link.snoozed_until){
            changed = true;
        }

        return normalized;
    });

    return changed;
}

function saveLinks(emptyExpected=false){

    if(links.length===0 &&
       !emptyExpected){
        return;
    }

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify({ items: links })
    );
}

function normalizeTicker(value){
    return (value || '').toString().trim().toUpperCase();
}

function getLocalDateKey(date = new Date()){

    const year = date.getFullYear();

    const month = String(
        date.getMonth() + 1
    ).padStart(2,'0');

    const day = String(
        date.getDate()
    ).padStart(2,'0');

    return `${year}-${month}-${day}`;
}

function normalizeSnoozedUntil(value){

    if(value === null ||
       value === undefined ||
       value === ''){
        return null;
    }

    if(typeof value === 'string'){

        const trimmed = value.trim();

        if(!trimmed){
            return null;
        }

        if(/^\d{4}-\d{2}-\d{2}$/.test(trimmed)){
            return trimmed;
        }

        if(/^\d+$/.test(trimmed)){
            value = Number(trimmed);
        }
        else{

            const parsed = new Date(trimmed);

            return Number.isNaN(parsed.getTime())
                ? trimmed
                : getLocalDateKey(parsed);
        }
    }

    if(typeof value === 'number'){

        return Number.isFinite(value)
            ? getLocalDateKey(new Date(value))
            : null;
    }

    if(value instanceof Date){

        return Number.isNaN(value.getTime())
            ? null
            : getLocalDateKey(value);
    }

    return null;
}

function getAvailableLinks(){

    const today = getLocalDateKey();

    return links.filter(
        l => !l.snoozed_until ||
             l.snoozed_until <= today
    );
}

function displayNextAvailable(){

    const available = getAvailableLinks();

    if(!available.length){

        currentLink=null;

        linkFreqContainer.style.display='none';
        trackQueryContainer.style.display='none';
        titleEditorContainer.style.display='none';
        buttonContainer.style.display='none';

        return;
    }

    displayLink(available[0]);
}

function displayLink(link){

    if(!link) return;

    currentLink = link;

    const track = isTrackItem(link);

    linkFreqContainer.style.display='flex';

    if(track){
        // Track item: hide link display, show ticker/query UI
        linkDisplay.style.display='none';
        trackQueryContainer.style.display='block';
        trackQueryTextarea.value = link.link || '';
        renderTrackSearchLinks();
    } else {
        // Find item: show link display, hide ticker/query UI
        linkDisplay.style.display='';
        linkDisplay.href = link.link;
        linkDisplay.textContent = link.link;

        trackQueryContainer.style.display='none';
    }

    titleEditorContainer.style.display='block';
    buttonContainer.style.display='block';
    document.getElementById('btn-update-url').style.display = track ? 'none' : '';

    titleTextarea.value = link.title || '';

    frequencyInput.value = link.frequency || '2';

    tickerInput.value = normalizeTicker(link.ticker);

    updateLinksList();
}

function saveCurrent(){

    if(!currentLink) return;

    currentLink.title =
        titleTextarea.value;

    currentLink.frequency =
        frequencyInput.value || '2';

    if(isTrackItem(currentLink)){
        currentLink.ticker = normalizeTicker(tickerInput.value);
        currentLink.link = trackQueryTextarea.value;
    }
}

function saveCurrentQueries(){
    if(!currentLink || !isTrackItem(currentLink)) return;
    currentLink.link = trackQueryTextarea.value;
    saveLinks();
    renderTrackSearchLinks();
}

function renderTrackSearchLinks(){
    const queries = (trackQueryTextarea.value || '')
        .split('\n')
        .map(s => s.trim())
        .filter(Boolean);

    trackSearchLinks.innerHTML = queries.map(q => {
        const enc = encodeURIComponent(q);
        return [
            `<a class="g" href="https://www.google.com/search?q=${enc}+latest" target="_blank">G: ${escapeHTML(q)}</a>`,
            `<a class="r" href="https://www.reddit.com/search/?q=${enc}+latest" target="_blank">Reddit</a>`,
            `<a class="x" href="https://x.com/search?q=%2B${enc}+latest" target="_blank">X</a>`
        ].join('');
    }).join('');
}

function saveCurrentTickerDraft(){

    if(!currentLink || !isTrackItem(currentLink)) return;

    currentLink.ticker = normalizeTicker(tickerInput.value);

    saveLinks();

    updateLinksList();
}

async function updateCurrentURL(){

    if(!currentLink) return;

    // temporary UI draft backup
    const draftTitle = titleTextarea.value;
    const draftFreq = frequencyInput.value;

    let clipboardText='';

    try{
        clipboardText =
            (await navigator.clipboard.readText()).trim();
    }
    catch(e){}

    let newUrl = clipboardText;

    if(
        !newUrl ||
        (
            !newUrl.startsWith('http') &&
            !newUrl.startsWith('file')
        )
    ){
        newUrl='';
    }

    const input = prompt(
        'Update URL:',
        newUrl || currentLink.link
    );

    if(input===null){

        // restore drafts
        titleTextarea.value = draftTitle;
        frequencyInput.value = draftFreq;

        return;
    }

    const finalUrl = input.trim();

    if(!finalUrl){

        // restore drafts
        titleTextarea.value = draftTitle;
        frequencyInput.value = draftFreq;

        return;
    }

    // ONLY update url
    currentLink.link = finalUrl;

    saveLinks();

    updateLinksList();

    // refresh UI
    displayLink(currentLink);

    // restore unsaved drafts
    titleTextarea.value = draftTitle;
    frequencyInput.value = draftFreq;
}

function openLink(link){

    if(!link) return;

    const title =
        (link.title || '').trim();

    if(title.startsWith('*')){

        alert(
            'This link is marked manual-only.\n\n' +
            'Open it manually so it stays outside the app.'
        );

        return;
    }

    const url = link.link?.trim() || '';

    if(
        url.toLowerCase().startsWith('file://')
    ){

        alert(
            'This is a local file link.\n\n' +
            'Please open manually:\n\n' +
            url
        );

        return;
    }

    setTimeout(()=>{
        window.open(url,'_blank');
    },50);
}

function laterLink(){

    saveCurrent();

    const current = currentLink;

    const available = getAvailableLinks();

    if(!available.length) return;

    let next = current;

    if(available.length > 1){

        const idx = available.indexOf(current);

        next =
            available[
                (idx + 1) % available.length
            ];
    }

    displayLink(next);

    if(!isTrackItem(next)){
        openLink(next);
    }

    saveLinks();
}

function snoozeCurrentLink(){

    saveCurrent();

    const current = currentLink;

    if(!current) return;

    const d = new Date();

    const freq =
        (current.frequency || '')
        .toString()
        .trim()
        .toUpperCase();

    if(!freq){

        d.setDate(d.getDate() + 1);
    }
    else if(!isNaN(freq)){

        d.setDate(
            d.getDate() + parseInt(freq)
        );
    }
    else if(freq === 'M'){

        d.setMonth(d.getMonth() + 1);
    }
    else if(freq === 'W'){

        d.setDate(d.getDate() + 7);
    }
    else if(freq === 'Y'){

        d.setFullYear(d.getFullYear() + 1);
    }
    else{

        d.setDate(d.getDate() + 1);
    }

    current.snoozed_until =
        getLocalDateKey(d);

    saveLinks();

    updateLinksList();

    const available =
        getAvailableLinks();

    if(!available.length){

        displayNextAvailable();

        return;
    }

    displayLink(available[0]);

    // track items: never auto-open on snooze
    if(!isTrackItem(available[0])){
        openLink(available[0]);
    }
}

function deleteCurrentLink(){

    if(!currentLink) return;

    if(!confirm('Delete this link?')){
        return;
    }

    saveCurrent();

    const current = currentLink;

    const available = getAvailableLinks();

    let next = null;

    if(available.length > 1){

        const idx = available.indexOf(current);

        next =
            available[
                (idx + 1) % available.length
            ];
    }

    const linkIdx =
        links.indexOf(current);

    if(linkIdx !== -1){

        links.splice(linkIdx,1);
    }

    currentLink = null;

    saveLinks(links.length===0);

    updateLinksList();

    if(next){

        displayLink(next);

        if(!isTrackItem(next)){
            openLink(next);
        }
    }
    else{

        displayNextAvailable();
    }
}

function addFromClipboard(){

    navigator.clipboard.readText()
    .then(text=>{

        let url=text.trim();

        if(
            !url ||
            (
                !url.startsWith('http') &&
                !url.startsWith('file')
            )
        ){

            url=prompt(
                'Enter URL or file path:'
            );

            if(!url) return;
        }

        const title = prompt(
            `Enter title for:\n${url}`
        );

        if(title===null) return;

        links.push({
            id: Date.now(),
            ticker: '',
            link: url,
            title: title || '',
            frequency:'2',
            snoozed_until:null
        });

        saveLinks();

        displayNextAvailable();

        updateLinksList();
    });
}
async function addFromGoogleFinance(){

    let clipboardText = '';

    try{
        clipboardText = (await navigator.clipboard.readText()).trim();
    }
    catch(e){}

    const match = clipboardText.match(
        /\/finance\/(?:beta\/)?quote\/([^#/?\s]+)/
    );

    let ticker;

    if(match){
        ticker = match[1].toUpperCase();
    } else {
        ticker = prompt('Enter ticker:', clipboardText.toUpperCase());
        if(ticker === null) return;
        ticker = ticker.trim().toUpperCase();
        if(!ticker) return;
    }

    const title = prompt(`Enter title for ${ticker}:`);

    if(title === null) return;

    links.push({
        id: Date.now(),
        ticker: ticker,
        link: '',
        title: title || '',
        frequency: '2',
        snoozed_until: null
    });

    saveLinks();

    displayNextAvailable();

    updateLinksList();
}
function importFromClipboard(){

    navigator.clipboard.readText()
    .then(text=>{

        const rows = parseTSV(text);

        if(rows.length < 2) return;

        const h = rows[0];

        const tickerIndex=h.indexOf('Ticker');
        const s=h.indexOf('Snoozed Until');
        const f=h.indexOf('Frequency');
        const u=h.indexOf('URL');
        const t=h.indexOf('Title');

        const imported=[];

        for(let i=1;i<rows.length;i++){

            const c = rows[i];

            if(c[u]){

                const ticker =
                    tickerIndex !== -1
                    ? normalizeTicker(decodeField(c[tickerIndex]))
                    : '';

                imported.push({

                    id: Date.now()+i,
                    ticker,

                    snoozed_until:
                        s !== -1
                        ? normalizeSnoozedUntil(
                            decodeField(c[s])
                        )
                        : null,

                    frequency:
                        f !== -1
                        ? decodeField(c[f])
                        : '2',

                    link:
                        decodeField(c[u]),

                    title:
                        t !== -1
                        ? decodeField(c[t])
                        : ''
                });
            }
        }

        links = imported;

        currentLink=null;

        saveLinks();

        displayNextAvailable();

        updateLinksList();
    });
}

function decodeField(value){

    try{
        return JSON.parse(value);
    }
    catch{
        return value?.trim() || '';
    }
}

function exportToClipboard(){

    const rows=[[
        'Snoozed Until',
        'Frequency',
        'URL',
        'Title',
        'Ticker'
    ]];

    links.forEach(l=>{

        rows.push([
            l.snoozed_until || '',
            l.frequency || '',
            l.link || '',
            l.title || '',
            normalizeTicker(l.ticker)
        ]);
    });

    const tsv = rows
        .map(r =>
            r.map(escapeTSV).join('\t')
        )
        .join('\n');

    navigator.clipboard.writeText(tsv);
}

function parseTSV(text){

    const rows = [];

    let row = [];

    let field = '';

    let inQuotes = false;

    for(let i=0;i<text.length;i++){

        const char = text[i];

        const next = text[i+1];

        if(inQuotes){

            if(char === '"' && next === '"'){

                field += '"';

                i++;
            }
            else if(char === '"'){

                inQuotes = false;
            }
            else{

                field += char;
            }
        }
        else{

            if(char === '"'){

                inQuotes = true;
            }
            else if(char === '\t'){

                row.push(field);

                field = '';
            }
            else if(char === '\n'){

                row.push(field);

                rows.push(row);

                row = [];

                field = '';
            }
            else if(char === '\r'){
            }
            else{

                field += char;
            }
        }
    }

    if(field !== '' || row.length){

        row.push(field);

        rows.push(row);
    }

    return rows;
}

function escapeTSV(value){

    value = value ?? '';

    value = value.toString();

    if(value.includes('"')){

        value =
            value.replace(/"/g,'""');
    }

    if(
        value.includes('\t') ||
        value.includes('\n') ||
        value.includes('"')
    ){

        value = `"${value}"`;
    }

    return value;
}

function updateLinksList(){

    const q =
    (searchInput.value || '')
    .trim()
    .toLowerCase();

const filtered = links.filter(l =>

    !q ||

    (l.ticker || '')
        .toLowerCase()
        .includes(q)

    ||

    (l.title || '')
        .toLowerCase()
        .includes(q)

    ||

    (l.link || '')
        .toLowerCase()
        .includes(q)
);

const sorted = [...filtered].sort((a,b)=>{

        if(!a.snoozed_until &&
           !b.snoozed_until){
            return 0;
        }

        if(!a.snoozed_until){
            return -1;
        }

        if(!b.snoozed_until){
            return 1;
        }

        return a.snoozed_until.localeCompare(
            b.snoozed_until
        );
    });

    linksTableBody.innerHTML =
        sorted.map(l=>`

        <tr>

            <td>${
                normalizeTicker(l.ticker)
                ? `<button onclick="filterTickerById(${l.id})">${escapeHTML(normalizeTicker(l.ticker))}</button>`
                : ''
            }</td>

            <td>

                ${l.snoozed_until || ''}

                ${
                    l.snoozed_until
                    ? `<button onclick="clearSnooze(${l.id})">x</button>`
                    : ''
                }

            </td>

            <td>
                ${l.frequency || ''}
            </td>

            <td>

               <a href="${l.link}" target="_blank">

                    ${l.title || '(no title)'}

                </a>

                <br>

                <small>${l.link}</small>

            </td>

        </tr>

    `).join('');
}

function focusLink(id){

    saveCurrent();

    const l = links.find(
        x => x.id === id
    );

    if(!l) return;

    displayLink(l);
}

function filterTickerById(id){

    const l = links.find(
        x => x.id === id
    );

    if(!l) return;

    l.snoozed_until = null;

    saveLinks();

    const ticker = normalizeTicker(l.ticker);

    searchInput.value = ticker;

    displayLink(l);

    updateLinksList();
}

function escapeHTML(value){

    return (value ?? '').toString()
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
}

function clearSnooze(id){

    const l = links.find(
        x=>x.id===id
    );

    if(l){

        l.snoozed_until=null;

        saveLinks();

        displayNextAvailable();

        updateLinksList();
    }
}
window.onload=init;
</script>
</body>
</html>
