<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80' fill='orange' font-family='sans-serif' font-weight='bold'%3ER%3C/text%3E%3C/svg%3E">
<title>Cloud RSS</title>
<style>
    body { font-family: sans-serif; background: #f5f5f5; margin: 0; padding: 10px; }
    .container { max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    h1 { font-size: 1.2rem; margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
    .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
    .row { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    input[type="text"], input[type="url"], input[type="search"] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; min-width: 120px; }
    button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; background: #007bff; color: white; display: flex; align-items: center; justify-content: center; }
    button.secondary { background: #6c757d; }
    button.danger { background: #dc3545; }
    button.icon-btn { padding: 5px 8px; font-size: 1rem; background: none; color: #333; border: 1px solid #ccc; opacity: 0.7; }
    button.icon-btn:hover { opacity: 1; background: #eee; }
    .feed-list { margin: 10px 0; max-height: 200px; overflow-y: auto; }
    .feed-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 13px; border-bottom: 1px dashed #eee; }
    .feed-info { display: flex; flex-direction: column; flex: 1; min-width: 0; margin-right: 10px; cursor: pointer; }
    .feed-info:hover { opacity: 0.7; }
    .feed-item.active { background: #e7f3ff; }
    .feed-url { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: bold; }
    .feed-meta { font-size: 11px; color: #666; }
    .items { display: flex; flex-direction: column; gap: 15px; }
    .item { padding: 10px; border: 1px solid #eee; border-radius: 4px; position: relative; }
    .item.read { opacity: 0.5; }
    .item h3 { margin: 0 0 5px 0; font-size: 1rem; }
    .item h3 a { text-decoration: none; color: #007bff; }
    .item .meta { font-size: 12px; color: #666; display: flex; justify-content: space-between; }
    .item .feed-tag { cursor: pointer; color: #007bff; }
    .item .feed-tag:hover { text-decoration: underline; }
    .item .desc { font-size: 14px; color: #333; margin-top: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .item .actions { margin-top: 10px; display: flex; gap: 10px; }

    .minimal .item { padding: 5px 10px; border: none; border-bottom: 1px solid #f0f0f0; border-radius: 0; }
    .minimal .item h3 { font-size: 0.9rem; margin-bottom: 0; line-height: 1.4; }
    .minimal .item .meta, .minimal .item .desc, .minimal .item .actions { display: none; }

    .hidden { display: none; }
    .settings-toggle { font-size: 12px; cursor: pointer; color: #007bff; text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
    <h1>
        Cloud RSS
        <span class="settings-toggle" onclick="toggleSettings()">Settings</span>
    </h1>

    <div class="controls">
        <div id="settingsPanel" class="hidden">
            <div class="row" style="margin-bottom: 10px;">
                <input type="url" id="workerUrl" placeholder="Worker URL" onchange="saveSettings()">
            </div>
        </div>

        <div id="manageFeeds" class="hidden" style="background: #fafafa; padding: 10px; border-radius: 4px; border: 1px solid #eee; margin-bottom: 10px;">
            <div class="row" style="margin-bottom: 5px;">
                <input type="url" id="newFeedUrl" placeholder="Add RSS or Page URL">
                <button onclick="addFeed()">Add</button>
            </div>
            <div class="row" style="justify-content: flex-end; gap: 10px; margin-bottom: 5px;">
                <button class="secondary" style="padding: 4px 8px; font-size: 11px;" onclick="exportToClipboard()">Copy TSV</button>
                <button class="secondary" style="padding: 4px 8px; font-size: 11px;" onclick="importFromClipboard()">Paste TSV</button>
            </div>
            <div id="feedsContainer" class="feed-list"></div>
        </div>

        <div class="row">
            <button class="icon-btn" onclick="refreshAll()" title="Refresh All" aria-label="Refresh All">🔄</button>
            <button class="icon-btn" onclick="toggleManageFeeds()" title="Manage Feeds" aria-label="Manage Feeds">📋</button>
            <button class="icon-btn" onclick="toggleRead()" title="Show/Hide Read" aria-label="Show/Hide Read">👁️</button>
            <button class="icon-btn" onclick="toggleMinimal()" title="Toggle Minimal View" aria-label="Toggle Minimal View">🗂️</button>
            <button class="icon-btn" onclick="markAllRead()" title="Mark All as Read" aria-label="Mark All as Read">✔️</button>
            <input type="search" id="searchInput" placeholder="Search..." oninput="renderItems()" style="max-width: 150px;">
        </div>
    </div>

    <div id="status" style="font-size: 12px; color: #666; margin-bottom: 10px;"></div>
    <div id="itemsContainer" class="items"></div>
</div>

<script>
    const STORAGE_KEY_FEEDS = 'cloud_rss_feeds';
    const STORAGE_KEY_SETTINGS = 'cloud_rss_settings';
    const STORAGE_KEY_READ = 'cloud_rss_read';
    const DEFAULT_WORKER_URL = 'https://amzwatch.donkey.workers.dev/';

    let feeds = [];
    let settings = { workerUrl: DEFAULT_WORKER_URL, showRead: true, isMinimal: true };
    let readItems = new Set();
    let allItems = [];
    let filterFeed = null;
    let seenLinks = new Set();

    function init() {
        const storedFeeds = JSON.parse(localStorage.getItem(STORAGE_KEY_FEEDS) || '[]');
        feeds = storedFeeds.map(f => typeof f === 'string' ? {url: f, lastFetch: null, itemCount: 0} : f);

        settings = JSON.parse(localStorage.getItem(STORAGE_KEY_SETTINGS) || JSON.stringify({workerUrl: DEFAULT_WORKER_URL, showRead: true, isMinimal: true}));
        if (!settings.workerUrl) settings.workerUrl = DEFAULT_WORKER_URL;
        if (settings.isMinimal === undefined) settings.isMinimal = true;

        readItems = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY_READ) || '[]'));

        document.getElementById('workerUrl').value = settings.workerUrl;
        renderFeeds();
        applyViewMode();
        if (feeds.length > 0 && settings.workerUrl) {
            refreshAll();
        }
    }

    function saveSettings() {
        settings.workerUrl = document.getElementById('workerUrl').value.trim() || DEFAULT_WORKER_URL;
        localStorage.setItem(STORAGE_KEY_SETTINGS, JSON.stringify(settings));
    }

    function toggleSettings() {
        document.getElementById('settingsPanel').classList.toggle('hidden');
    }

    function toggleManageFeeds() {
        const el = document.getElementById('manageFeeds');
        el.classList.toggle('hidden');
    }

    function toggleRead() {
        settings.showRead = !settings.showRead;
        localStorage.setItem(STORAGE_KEY_SETTINGS, JSON.stringify(settings));
        renderItems();
    }

    function toggleMinimal() {
        settings.isMinimal = !settings.isMinimal;
        localStorage.setItem(STORAGE_KEY_SETTINGS, JSON.stringify(settings));
        applyViewMode();
        renderItems();
    }

    function applyViewMode() {
        const container = document.getElementById('itemsContainer');
        if (settings.isMinimal) {
            container.classList.add('minimal');
        } else {
            container.classList.remove('minimal');
        }
    }

    function addFeed() {
        const url = document.getElementById('newFeedUrl').value.trim();
        if (!url) return;
        if (feeds.some(f => f.url === url)) return;
        feeds.push({url, lastFetch: null, itemCount: 0});
        saveFeeds();
        document.getElementById('newFeedUrl').value = '';
        renderFeeds();
        refreshAll();
    }

    function removeFeed(url) {
        feeds = feeds.filter(f => f.url !== url);
        if (filterFeed === url) filterFeed = null;
        saveFeeds();
        renderFeeds();
        refreshAll();
    }

    function saveFeeds() {
        localStorage.setItem(STORAGE_KEY_FEEDS, JSON.stringify(feeds));
    }

    function setFilterFeed(url) {
        if (filterFeed === url) {
            filterFeed = null;
        } else {
            filterFeed = url;
        }
        renderFeeds();
        renderItems();
    }

    function renderFeeds() {
        const container = document.getElementById('feedsContainer');
        container.innerHTML = '';
        feeds.forEach(f => {
            const div = document.createElement('div');
            div.className = `feed-item ${filterFeed === f.url ? 'active' : ''}`;

            const info = document.createElement('div');
            info.className = 'feed-info';
            info.onclick = () => setFilterFeed(f.url);

            const urlSpan = document.createElement('span');
            urlSpan.className = 'feed-url';
            urlSpan.textContent = f.url;

            const meta = document.createElement('div');
            meta.className = 'feed-meta';
            const fetchStr = f.lastFetch ? new Date(f.lastFetch).toLocaleTimeString() : 'Never';
            meta.textContent = `${f.itemCount || 0} items | Last: ${fetchStr}`;

            info.appendChild(urlSpan);
            info.appendChild(meta);

            const btn = document.createElement('button');
            btn.className = 'danger';
            btn.style.cssText = 'padding: 2px 6px; font-size: 10px;';
            btn.textContent = 'Remove';
            btn.onclick = (e) => { e.stopPropagation(); removeFeed(f.url); };

            div.appendChild(info);
            div.appendChild(btn);
            container.appendChild(div);
        });
    }

    async function refreshAll() {
        if (!settings.workerUrl) {
            alert('Please set Worker URL first');
            return;
        }
        if (feeds.length === 0) return;

        setStatus('Refreshing...');
        allItems = [];
        seenLinks.clear();
        renderItems();

        const priorityFeeds = feeds.slice(0, 2);
        const backgroundFeeds = feeds.slice(2);

        const priorityPromises = priorityFeeds.map(f => fetchSingle(f.url));
        let backgroundPromise = Promise.resolve();
        if (backgroundFeeds.length > 0) {
            backgroundPromise = fetchBulk(backgroundFeeds.map(f => f.url));
        }

        await Promise.all([...priorityPromises, backgroundPromise]);
        setStatus(`Updated at ${new Date().toLocaleTimeString()}`);
    }

    async function fetchSingle(url) {
        try {
            const workerUrl = new URL(settings.workerUrl);
            workerUrl.searchParams.set('url', url);
            const response = await fetch(workerUrl.toString());
            if (!response.ok) throw new Error(response.statusText);

            const contentType = response.headers.get('Content-Type') || '';
            const text = await response.text();

            let count = 0;
            if (contentType.includes('application/json')) {
                count = parseScraped(JSON.parse(text), url);
            } else {
                const xml = new DOMParser().parseFromString(text, 'text/xml');
                count = parseFeed(xml, url);
            }

            updateFeedStats(url, count);
            sortAndRender();
        } catch (e) {
            console.error('Fetch error for ' + url, e);
        }
    }

    async function fetchBulk(urls) {
        try {
            const response = await fetch(settings.workerUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ urls })
            });

            if (!response.ok) throw new Error('Worker error: ' + response.status);

            const results = await response.json();
            results.forEach(res => {
                if (res.body) {
                    let count = 0;
                    try {
                        if (res.isJSON) {
                            count = parseScraped(JSON.parse(res.body), res.url);
                        } else {
                            const xml = new DOMParser().parseFromString(res.body, 'text/xml');
                            count = parseFeed(xml, res.url);
                        }
                        updateFeedStats(res.url, count);
                    } catch (e) {
                        console.error('Parse error for ' + res.url, e);
                    }
                }
            });
            sortAndRender();
        } catch (err) {
            console.error('Bulk fetch error', err);
        }
    }

    function updateFeedStats(url, count) {
        const f = feeds.find(x => x.url === url);
        if (f) {
            f.lastFetch = Date.now();
            f.itemCount = count;
            saveFeeds();
            renderFeeds();
        }
    }

    function sortAndRender() {
        allItems.sort((a, b) => b.date - a.date);
        renderItems();
    }

    function parseScraped(links, feedUrl) {
        let count = 0;
        links.forEach(l => {
            if (seenLinks.has(l.link)) return;
            seenLinks.add(l.link);
            count++;
            allItems.push({
                id: l.link,
                title: l.title,
                link: l.link,
                date: new Date(),
                description: '',
                feedTitle: feedUrl,
                feedUrl: feedUrl
            });
        });
        return count;
    }

    function parseFeed(xml, feedUrl) {
        const feedTitle = xml.querySelector('channel > title, feed > title')?.textContent || feedUrl;
        let count = 0;

        const items = xml.querySelectorAll('item');
        items.forEach(item => {
            const link = item.querySelector('link')?.textContent || '';
            if (seenLinks.has(link)) return;
            seenLinks.add(link);
            count++;
            const title = item.querySelector('title')?.textContent || 'No Title';
            const pubDate = item.querySelector('pubDate, dc\\:date')?.textContent;
            const date = pubDate ? new Date(pubDate) : new Date(0);
            const description = item.querySelector('description')?.textContent || '';
            const id = item.querySelector('guid')?.textContent || link || (title + date.getTime());

            allItems.push({ id, title, link, date, description, feedTitle, feedUrl });
        });

        const entries = xml.querySelectorAll('entry');
        entries.forEach(entry => {
            const link = entry.querySelector('link')?.getAttribute('href') || '';
            if (seenLinks.has(link)) return;
            seenLinks.add(link);
            count++;
            const title = entry.querySelector('title')?.textContent || 'No Title';
            const updated = entry.querySelector('updated, published')?.textContent;
            const date = updated ? new Date(updated) : new Date(0);
            const content = entry.querySelector('summary, content')?.textContent || '';
            const id = entry.querySelector('id')?.textContent || link || (title + date.getTime());

            allItems.push({ id, title, link, date, description: content, feedTitle, feedUrl });
        });
        return count;
    }

    function getFilteredItems() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        let filtered = settings.showRead ? allItems : allItems.filter(i => !readItems.has(i.id));

        if (filterFeed) {
            filtered = filtered.filter(i => i.feedUrl === filterFeed);
        }

        if (q) {
            filtered = filtered.filter(i =>
                i.title.toLowerCase().includes(q) ||
                i.description.toLowerCase().includes(q) ||
                i.feedTitle.toLowerCase().includes(q)
            );
        }
        return filtered;
    }

    function renderItems() {
        const container = document.getElementById('itemsContainer');
        const filtered = getFilteredItems();

        container.innerHTML = '';
        if (filterFeed) {
            const indicator = document.createElement('div');
            indicator.style.cssText = 'padding: 5px; font-size: 12px; color: #007bff; border-bottom: 1px solid #eee; margin-bottom: 10px; display: flex; justify-content: space-between;';
            indicator.innerHTML = `<span>Filtered by: ${filterFeed}</span><span style="cursor:pointer;" onclick="setFilterFeed(null)">Clear</span>`;
            container.appendChild(indicator);
        }

        filtered.forEach(item => {
            const isRead = readItems.has(item.id);
            const itemDiv = document.createElement('div');
            itemDiv.className = `item ${isRead ? 'read' : ''}`;

            const h3 = document.createElement('h3');
            const a = document.createElement('a');
            a.href = item.link;
            a.target = '_blank';
            a.textContent = item.title;
            a.onclick = () => markRead(item.id);
            h3.appendChild(a);

            const metaDiv = document.createElement('div');
            metaDiv.className = 'meta';
            const feedSpan = document.createElement('span');
            feedSpan.className = 'feed-tag';
            feedSpan.textContent = item.feedTitle;
            feedSpan.onclick = () => setFilterFeed(item.feedUrl);
            const dateSpan = document.createElement('span');
            dateSpan.textContent = item.date.getTime() > 0 ? `${item.date.toLocaleDateString()} ${item.date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}` : '';
            metaDiv.appendChild(feedSpan);
            metaDiv.appendChild(dateSpan);

            const descDiv = document.createElement('div');
            descDiv.className = 'desc';
            descDiv.textContent = stripHtml(item.description);

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'actions';
            const readBtn = document.createElement('button');
            readBtn.className = 'secondary';
            readBtn.style.cssText = 'padding: 4px 8px; font-size: 12px;';
            readBtn.textContent = isRead ? 'Mark Unread' : 'Mark Read';
            readBtn.onclick = () => toggleItemRead(item.id);
            actionsDiv.appendChild(readBtn);

            itemDiv.appendChild(h3);
            itemDiv.appendChild(metaDiv);
            itemDiv.appendChild(descDiv);
            itemDiv.appendChild(actionsDiv);
            container.appendChild(itemDiv);
        });
    }

    function stripHtml(html) {
        if (!html) return "";
        const doc = new DOMParser().parseFromString(html, 'text/html');
        return doc.body.textContent || "";
    }

    function markRead(id) {
        readItems.add(id);
        saveRead();
        renderItems();
    }

    function toggleItemRead(id) {
        if (readItems.has(id)) {
            readItems.delete(id);
        } else {
            readItems.add(id);
        }
        saveRead();
        renderItems();
    }

    function markAllRead() {
        const visible = getFilteredItems();
        visible.forEach(item => readItems.add(item.id));
        saveRead();
        renderItems();
    }

    function saveRead() {
        localStorage.setItem(STORAGE_KEY_READ, JSON.stringify([...readItems]));
    }

    function setStatus(msg) {
        document.getElementById('status').textContent = msg;
    }

    async function exportToClipboard() {
        const rows = [['URL', 'Items', 'Last Fetch']];
        feeds.forEach(f => {
            rows.push([f.url, f.itemCount || 0, f.lastFetch || '']);
        });
        const tsv = rows.map(r => r.join('\t')).join('\n');
        try {
            await navigator.clipboard.writeText(tsv);
            setStatus('Feeds copied to clipboard');
        } catch (e) {
            alert('Failed to copy: ' + e.message);
        }
    }

    async function importFromClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            const lines = text.trim().split('\n');
            if (lines.length < 2) return;

            const header = lines[0].split('\t');
            const urlIdx = header.indexOf('URL');
            if (urlIdx === -1) {
                alert('Invalid TSV: Missing "URL" column');
                return;
            }

            const imported = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split('\t');
                const url = cols[urlIdx]?.trim();
                if (url && !feeds.some(f => f.url === url)) {
                    imported.push({ url, itemCount: 0, lastFetch: null });
                }
            }

            if (imported.length > 0) {
                feeds.push(...imported);
                saveFeeds();
                renderFeeds();
                setStatus(`Imported ${imported.length} feeds`);
                refreshAll();
            }
        } catch (e) {
            alert('Failed to read clipboard: ' + e.message);
        }
    }

    init();
</script>
</body>
</html>
