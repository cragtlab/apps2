<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80' fill='orange' font-family='sans-serif' font-weight='bold'%3ER%3C/text%3E%3C/svg%3E">
<title>Cloud RSS</title>
<style>
    body { font-family: sans-serif; background: #f5f5f5; margin: 0; padding: 10px; }
    .container { max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    h1 { font-size: 1.2rem; margin-top: 0; }
    .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
    .row { display: flex; gap: 5px; flex-wrap: wrap; }
    input[type="text"], input[type="url"], input[type="search"] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; min-width: 120px; }
    button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; background: #007bff; color: white; }
    button.secondary { background: #6c757d; }
    button.danger { background: #dc3545; }
    .feed-list { margin: 10px 0; }
    .feed-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 13px; }
    .items { display: flex; flex-direction: column; gap: 15px; }
    .item { padding: 10px; border: 1px solid #eee; border-radius: 4px; position: relative; }
    .item.read { opacity: 0.5; }
    .item h3 { margin: 0 0 5px 0; font-size: 1rem; }
    .item h3 a { text-decoration: none; color: #007bff; }
    .item .meta { font-size: 12px; color: #666; display: flex; justify-content: space-between; }
    .item .desc { font-size: 14px; color: #333; margin-top: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .item .actions { margin-top: 10px; display: flex; gap: 10px; }
    .hidden { display: none; }
</style>
</head>
<body>
<div class="container">
    <h1>Cloud RSS</h1>

    <div class="controls">
        <div class="row">
            <input type="url" id="workerUrl" placeholder="Cloudflare Worker URL (https://...)" onchange="saveSettings()">
        </div>
        <div class="row">
            <input type="url" id="newFeedUrl" placeholder="Add Feed URL">
            <button onclick="addFeed()">Add</button>
        </div>
        <div id="manageFeeds" class="hidden">
            <div id="feedsContainer" class="feed-list"></div>
        </div>
        <div class="row">
            <button onclick="refreshAll()">Refresh All</button>
            <button class="secondary" onclick="toggleManageFeeds()">Manage Feeds</button>
            <button class="secondary" onclick="toggleRead()">Show/Hide Read</button>
            <input type="search" id="searchInput" placeholder="Search items..." oninput="renderItems()">
        </div>
    </div>

    <div id="status" style="font-size: 12px; color: #666; margin-bottom: 10px;"></div>
    <div id="itemsContainer" class="items"></div>
</div>

<script>
    const STORAGE_KEY_FEEDS = 'cloud_rss_feeds';
    const STORAGE_KEY_SETTINGS = 'cloud_rss_settings';
    const STORAGE_KEY_READ = 'cloud_rss_read';

    let feeds = [];
    let settings = { workerUrl: '', showRead: true };
    let readItems = new Set();
    let allItems = [];

    function init() {
        feeds = JSON.parse(localStorage.getItem(STORAGE_KEY_FEEDS) || '[]');
        settings = JSON.parse(localStorage.getItem(STORAGE_KEY_SETTINGS) || '{"workerUrl":"","showRead":true}');
        readItems = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY_READ) || '[]'));

        document.getElementById('workerUrl').value = settings.workerUrl || '';
        renderFeeds();
        if (feeds.length > 0 && settings.workerUrl) {
            refreshAll();
        }
    }

    function saveSettings() {
        settings.workerUrl = document.getElementById('workerUrl').value.trim();
        localStorage.setItem(STORAGE_KEY_SETTINGS, JSON.stringify(settings));
    }

    function toggleManageFeeds() {
        const el = document.getElementById('manageFeeds');
        el.classList.toggle('hidden');
    }

    function toggleRead() {
        settings.showRead = !settings.showRead;
        localStorage.setItem(STORAGE_KEY_SETTINGS, JSON.stringify(settings));
        renderItems();
    }

    function addFeed() {
        const url = document.getElementById('newFeedUrl').value.trim();
        if (!url) return;
        if (feeds.includes(url)) return;
        feeds.push(url);
        localStorage.setItem(STORAGE_KEY_FEEDS, JSON.stringify(feeds));
        document.getElementById('newFeedUrl').value = '';
        renderFeeds();
        refreshAll();
    }

    function removeFeed(url) {
        feeds = feeds.filter(f => f !== url);
        localStorage.setItem(STORAGE_KEY_FEEDS, JSON.stringify(feeds));
        renderFeeds();
        refreshAll();
    }

    function renderFeeds() {
        const container = document.getElementById('feedsContainer');
        container.innerHTML = '';
        feeds.forEach(url => {
            const div = document.createElement('div');
            div.className = 'feed-item';

            const span = document.createElement('span');
            span.style.cssText = 'overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; margin-right: 10px;';
            span.textContent = url;

            const btn = document.createElement('button');
            btn.className = 'danger';
            btn.style.cssText = 'padding: 2px 6px; font-size: 10px;';
            btn.textContent = 'Remove';
            btn.onclick = () => removeFeed(url);

            div.appendChild(span);
            div.appendChild(btn);
            container.appendChild(div);
        });
    }

    async function refreshAll() {
        if (!settings.workerUrl) {
            alert('Please set Worker URL first');
            return;
        }
        if (feeds.length === 0) return;

        setStatus('Refreshing...');
        allItems = [];
        renderItems();

        const priorityFeeds = feeds.slice(0, 2);
        const backgroundFeeds = feeds.slice(2);

        const priorityPromises = priorityFeeds.map(url => fetchSingle(url));
        let backgroundPromise = Promise.resolve();
        if (backgroundFeeds.length > 0) {
            backgroundPromise = fetchBulk(backgroundFeeds);
        }

        await Promise.all([...priorityPromises, backgroundPromise]);
        setStatus(`Updated at ${new Date().toLocaleTimeString()}`);
    }

    async function fetchSingle(url) {
        try {
            const workerUrl = new URL(settings.workerUrl);
            workerUrl.searchParams.set('url', url);
            const response = await fetch(workerUrl.toString());
            if (!response.ok) throw new Error(response.statusText);
            const text = await response.text();
            const parser = new DOMParser();
            const xml = parser.parseFromString(text, 'text/xml');
            parseFeed(xml, url);
            sortAndRender();
        } catch (e) {
            console.error('Fetch error for ' + url, e);
        }
    }

    async function fetchBulk(urls) {
        try {
            const response = await fetch(settings.workerUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ urls })
            });

            if (!response.ok) throw new Error('Worker error: ' + response.status);

            const results = await response.json();
            const parser = new DOMParser();

            results.forEach(res => {
                if (res.body) {
                    try {
                        const xml = parser.parseFromString(res.body, 'text/xml');
                        parseFeed(xml, res.url);
                    } catch (e) {
                        console.error('Parse error for ' + res.url, e);
                    }
                }
            });
            sortAndRender();
        } catch (err) {
            console.error('Bulk fetch error', err);
        }
    }

    function sortAndRender() {
        allItems.sort((a, b) => b.date - a.date);
        renderItems();
    }

    function parseFeed(xml, feedUrl) {
        const feedTitle = xml.querySelector('channel > title, feed > title')?.textContent || feedUrl;

        // RSS 2.0
        const items = xml.querySelectorAll('item');
        items.forEach(item => {
            const title = item.querySelector('title')?.textContent || 'No Title';
            const link = item.querySelector('link')?.textContent || '';
            const pubDate = item.querySelector('pubDate, dc\\:date')?.textContent;
            const date = pubDate ? new Date(pubDate) : new Date(0);
            const description = item.querySelector('description')?.textContent || '';
            const id = item.querySelector('guid')?.textContent || link || (title + date.getTime());

            allItems.push({ id, title, link, date, description, feedTitle });
        });

        // Atom
        const entries = xml.querySelectorAll('entry');
        entries.forEach(entry => {
            const title = entry.querySelector('title')?.textContent || 'No Title';
            const link = entry.querySelector('link')?.getAttribute('href') || '';
            const updated = entry.querySelector('updated, published')?.textContent;
            const date = updated ? new Date(updated) : new Date(0);
            const content = entry.querySelector('summary, content')?.textContent || '';
            const id = entry.querySelector('id')?.textContent || link || (title + date.getTime());

            allItems.push({ id, title, link, date, description: content, feedTitle });
        });
    }

    function renderItems() {
        const container = document.getElementById('itemsContainer');
        const q = document.getElementById('searchInput').value.toLowerCase();

        let filtered = settings.showRead ? allItems : allItems.filter(i => !readItems.has(i.id));

        if (q) {
            filtered = filtered.filter(i =>
                i.title.toLowerCase().includes(q) ||
                i.description.toLowerCase().includes(q) ||
                i.feedTitle.toLowerCase().includes(q)
            );
        }

        container.innerHTML = '';
        filtered.forEach(item => {
            const isRead = readItems.has(item.id);
            const itemDiv = document.createElement('div');
            itemDiv.className = `item ${isRead ? 'read' : ''}`;

            const h3 = document.createElement('h3');
            const a = document.createElement('a');
            a.href = item.link;
            a.target = '_blank';
            a.textContent = item.title;
            a.onclick = () => markRead(item.id);
            h3.appendChild(a);

            const metaDiv = document.createElement('div');
            metaDiv.className = 'meta';
            const feedSpan = document.createElement('span');
            feedSpan.textContent = item.feedTitle;
            const dateSpan = document.createElement('span');
            dateSpan.textContent = `${item.date.toLocaleDateString()} ${item.date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            metaDiv.appendChild(feedSpan);
            metaDiv.appendChild(dateSpan);

            const descDiv = document.createElement('div');
            descDiv.className = 'desc';
            descDiv.textContent = stripHtml(item.description);

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'actions';
            const readBtn = document.createElement('button');
            readBtn.className = 'secondary';
            readBtn.style.cssText = 'padding: 4px 8px; font-size: 12px;';
            readBtn.textContent = isRead ? 'Mark Unread' : 'Mark Read';
            readBtn.onclick = () => toggleItemRead(item.id);
            actionsDiv.appendChild(readBtn);

            itemDiv.appendChild(h3);
            itemDiv.appendChild(metaDiv);
            itemDiv.appendChild(descDiv);
            itemDiv.appendChild(actionsDiv);
            container.appendChild(itemDiv);
        });
    }

    function stripHtml(html) {
        const doc = new DOMParser().parseFromString(html, 'text/html');
        return doc.body.textContent || "";
    }

    function markRead(id) {
        readItems.add(id);
        saveRead();
        renderItems();
    }

    function toggleItemRead(id) {
        if (readItems.has(id)) {
            readItems.delete(id);
        } else {
            readItems.add(id);
        }
        saveRead();
        renderItems();
    }

    function saveRead() {
        localStorage.setItem(STORAGE_KEY_READ, JSON.stringify([...readItems]));
    }

    function setStatus(msg) {
        document.getElementById('status').textContent = msg;
    }

    init();
</script>
</body>
</html>
