<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Video Compressor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.min.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; text-align:center; padding:20px; }
.container { background:white; padding:20px; border-radius:10px; max-width:500px; margin:auto; }
.drop { border:2px dashed #aaa; padding:20px; margin:10px; cursor:pointer; }
.drop.drag { background:#eef; }
#log { font-size:12px; text-align:left; background:#eee; padding:10px; height:120px; overflow:auto; }
</style>
</head>

<body>

<div class="container">
    <h2>🎬 Video Compressor</h2>

    <div id="drop" class="drop">Drag video here or click</div>
    <input type="file" id="fileInput" accept="video/*" hidden>

    <label>Quality:</label><br>
    <input type="range" id="crf" min="18" max="35" value="28">
    <span id="crfVal">28</span><br>

    <button onclick="compress()">Compress</button>

    <p id="status"></p>
    <a id="download" style="display:none;"></a>

    <div id="log"></div>
</div>

<script>
const { createFFmpeg, fetchFile } = FFmpeg;

const ffmpeg = createFFmpeg({
    log: true,
    corePath: "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/ffmpeg-core.js"
});

const logDiv = document.getElementById("log");
const drop = document.getElementById("drop");
const fileInput = document.getElementById("fileInput");

let selectedFile = null;

function log(msg) {
    logDiv.innerHTML += msg + "<br>";
    logDiv.scrollTop = logDiv.scrollHeight;
}

// slider
document.getElementById("crf").oninput = e => {
    document.getElementById("crfVal").innerText = e.target.value;
};

// drag drop
drop.onclick = () => fileInput.click();

drop.ondragover = e => {
    e.preventDefault();
    drop.classList.add("drag");
};

drop.ondragleave = () => drop.classList.remove("drag");

drop.ondrop = e => {
    e.preventDefault();
    drop.classList.remove("drag");
    selectedFile = e.dataTransfer.files[0];
    drop.innerText = selectedFile.name;
};

fileInput.onchange = () => {
    selectedFile = fileInput.files[0];
    drop.innerText = selectedFile.name;
};

// main
async function compress() {
    if (!selectedFile) {
        alert("Select a video first");
        return;
    }

    const crf = document.getElementById("crf").value;

    log("Loading FFmpeg...");
    document.getElementById("status").innerText = "Loading...";

    if (!ffmpeg.isLoaded()) {
        await ffmpeg.load();
    }

    log("Writing file...");
    ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(selectedFile));

    log("Compressing...");
    document.getElementById("status").innerText = "Compressing...";

    await ffmpeg.run(
        '-i', 'input.mp4',
        '-vcodec', 'libx264',
        '-crf', crf,
        '-preset', 'veryfast',
        'output.mp4'
    );

    const data = ffmpeg.FS('readFile', 'output.mp4');

    const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));

    const dl = document.getElementById("download");
    dl.href = url;
    dl.download = "compressed.mp4";
    dl.style.display = "block";
    dl.innerText = "⬇ Download";

    document.getElementById("status").innerText = "Done!";
}
</script>

</body>
</html>
