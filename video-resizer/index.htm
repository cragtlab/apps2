<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Video Compressor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { createFFmpeg, fetchFile } from "https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.esm.js";

const ffmpeg = createFFmpeg({
    log: true,
    corePath: "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/ffmpeg-core.js"
});
</script>
<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
    padding: 20px;
}
.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 500px;
    margin: auto;
}
input, button {
    margin: 10px;
}
#log {
    font-size: 12px;
    text-align: left;
    background: #eee;
    padding: 10px;
    height: 120px;
    overflow: auto;
}
</style>
</head>

<body>

<div class="container">
    <h2>🎬 Video Compressor</h2>

    <input type="file" id="fileInput" accept="video/*"><br>

    <label>Quality (Lower = smaller file):</label><br>
    <input type="range" id="crf" min="18" max="35" value="28">
    <span id="crfVal">28</span><br>

    <button onclick="compress()">Compress</button>

    <p id="status"></p>

    <a id="download" style="display:none;">Download Compressed Video</a>

    <div id="log"></div>
</div>

<script>
const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ log: true });

const logDiv = document.getElementById("log");

function log(msg) {
    logDiv.innerHTML += msg + "<br>";
    logDiv.scrollTop = logDiv.scrollHeight;
}

document.getElementById("crf").oninput = function() {
    document.getElementById("crfVal").innerText = this.value;
};

async function compress() {
    const fileInput = document.getElementById("fileInput");
    if (!fileInput.files.length) {
        alert("Select a video first");
        return;
    }

    const file = fileInput.files[0];
    const crf = document.getElementById("crf").value;

    document.getElementById("status").innerText = "Loading FFmpeg...";
    log("Loading FFmpeg...");

    if (!ffmpeg.isLoaded()) {
        await ffmpeg.load();
    }

    document.getElementById("status").innerText = "Processing...";
    log("Writing file...");

    ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

    log("Compressing...");

    await ffmpeg.run(
        '-i', 'input.mp4',
        '-vcodec', 'libx264',
        '-crf', crf,
        '-preset', 'veryfast',
        'output.mp4'
    );

    log("Reading output...");

    const data = ffmpeg.FS('readFile', 'output.mp4');

    const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));

    const download = document.getElementById("download");
    download.href = url;
    download.download = "compressed.mp4";
    download.style.display = "block";
    download.innerText = "⬇ Download Compressed Video";

    document.getElementById("status").innerText = "Done!";
}
</script>

</body>
</html>
