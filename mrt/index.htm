<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRT Door Finder</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.header {
  position: sticky;
  top: 0;
  background: white;
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.line-buttons {
  display: flex;
  gap: 6px;
  overflow-x: auto;
}

.line-btn {
  border: none;
  color: white;
  padding: 10px 14px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.line-btn.active {
  outline: 3px solid #00000033;
}

#stations {
  padding: 10px;
}

.station {
  background: white;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
}

.station-name {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 10px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #f7f7f7;
  padding: 10px;
  border-radius: 8px;
  margin-top: 6px;
}

.door {
  background: #1976d2;
  color: white;
  padding: 4px 10px;
  border-radius: 999px;
  font-weight: bold;
}

.feedback {
  background: white;
  margin: 10px;
  padding: 12px;
  border-radius: 10px;
}

textarea {
  width: 100%;
  min-height: 120px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  resize: vertical;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

.feedback-buttons {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.feedback button {
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.save-btn {
  background: #2e7d32;
  color: white;
}

.email-btn {
  background: #1565c0;
  color: white;
}

#saveStatus {
  margin-top: 8px;
  font-size: 14px;
  color: #2e7d32;
}
</style>
</head>
<body>

<div class="header">
  <div class="line-buttons" id="lineButtons"></div>
</div>

<div id="stations"></div>

<div class="feedback">
  <h3>Wrong info? (click above door to fix)</h3>

  <textarea id="feedbackText" placeholder="Example:
Lavender towards Pasir Ris should be Door 3"></textarea>

  <div class="feedback-buttons">
    <button class="save-btn" onclick="saveFeedback()">Save</button>
    <button class="email-btn" onclick="sendUpdate()">Send Update</button>
  </div>

  <div id="saveStatus"></div>
</div>

<script>
const mrtData = {
  EW: {
    color: '#2e9b43',
    stations: [
      {
        name: 'Lavender',
        directions: [
          { to: 'Pasir Ris', door: '2' },
          { to: 'Tuas Link', door: '6' }
        ]
      },
      {
        name: 'Paya Lebar',
        directions: [
          { to: 'Pasir Ris', door: '4' },
          { to: 'Tuas Link', door: '8' }
        ]
      }
    ]
  },

  NS: {
    color: '#d32f2f',
    stations: [
      {
        name: 'Orchard',
        directions: [
          { to: 'Jurong East', door: '3' },
          { to: 'Marina South Pier', door: '8' }
        ]
      }
    ]
  },

  CC: {
    color: '#f59e0b',
    stations: [
      {
        name: 'Paya Lebar',
        directions: [
          { to: 'HarbourFront', door: '2' },
          { to: 'Dhoby Ghaut', door: '7' }
        ]
      },
      {
        name: 'Macpherson',
        directions: [
          { to: 'HarbourFront', door: '6' },
          { to: 'Dhoby Ghaut', door: '6' }
        ]
      }
    ]
  },

  DT: {
    color: '#005ec4',
    stations: [
      {
        name: 'Bendemeer',
        directions: [
          { to: 'Expo', door: '?' },
          { to: 'Bukit Panjang', door: '5' }
        ]
      }
    ]
  }
};

let currentLine = 'EW';

const lineButtons = document.getElementById('lineButtons');
const stations = document.getElementById('stations');

function render() {
  lineButtons.innerHTML = '';

  Object.entries(mrtData).forEach(([key, line]) => {
    const btn = document.createElement('button');
    btn.className = 'line-btn';
    btn.textContent = key;
    btn.style.background = line.color;

    if (key === currentLine) {
      btn.classList.add('active');
    }

    btn.onclick = () => {
      currentLine = key;
      render();
    };

    lineButtons.appendChild(btn);
  });

  stations.innerHTML = '';

  mrtData[currentLine].stations.forEach(station => {
    const div = document.createElement('div');
    div.className = 'station';

    let rows = '';

    station.directions.forEach(direction => {
      rows += `
        <div class="row" onclick="quickFeedback('${station.name}','${direction.to}')">
          <div>âž¡ ${direction.to}</div>
          <div class="door">Door ${direction.door}</div>
        </div>
      `;
    });

    div.innerHTML = `
      <div class="station-name">${station.name}</div>
      ${rows}
    `;

    stations.appendChild(div);
  });
}

function saveFeedback() {
  const text = document.getElementById('feedbackText').value;

  try {
    localStorage.setItem('mrt_feedback', text);
    document.getElementById('saveStatus').textContent = 'Saved locally successfully';
  } catch (e) {
    document.getElementById('saveStatus').textContent = 'Save failed';
  }
}

function loadFeedback() {
  const saved = localStorage.getItem('mrt_feedback');

  if (saved) {
    document.getElementById('feedbackText').value = saved;
    document.getElementById('saveStatus').textContent = 'Loaded saved feedback';
  }
}

function sendUpdate() {
  const text = document.getElementById('feedbackText').value;

  const subject = encodeURIComponent('MRT Door Finder Update');
  const body = encodeURIComponent(text);

  window.location.href = `mailto:bnxx6778@gmail.com?subject=${subject}&body=${body}`;
}

function quickFeedback(station, direction) {
  const textarea = document.getElementById('feedbackText');

  const template = `- update ${station} ${direction} door `;

  if (textarea.value && !textarea.value.endsWith('\n')) {
    textarea.value += '\n';
  }

  textarea.value += template;
  textarea.focus();

  textarea.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

render();
loadFeedback();
</script>

</body>
</html>
