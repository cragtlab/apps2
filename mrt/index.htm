<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%2250%22 x=%2250%22 text-anchor=%22middle%22 dominant-baseline=%22central%22 font-size=%2280%22 font-weight=%22bold%22 fill=%22%231a1a2e%22 font-family=%22Arial,sans-serif%22>M</text></svg>">
<title>MRT Door Finder</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: Arial, sans-serif; background: #f0f0f0; font-size: 15px; padding-bottom: 110px; }

.header {
  position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a2e; z-index: 20;
  padding: 8px 10px 10px;
}
.line-buttons { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; }
.line-btn {
  border: none; color: white; padding: 8px 14px; border-radius: 8px;
  font-weight: bold; cursor: pointer; flex-shrink: 0; font-size: 14px;
}
.line-btn.active { outline: 3px solid rgba(255,255,255,0.5); }

#stations, .section { padding: 10px; }

.station, .travel-card, .card {
  background: white; border-radius: 10px; padding: 12px; margin-bottom: 10px;
}
.station-name, .travel-title, .card-title {
  font-size: 16px; font-weight: bold; margin-bottom: 10px;
}
.row {
  display: flex; justify-content: space-between; align-items: center;
  background: #f7f7f7; padding: 10px; border-radius: 8px; margin-top: 6px; cursor: pointer;
}
.door { background: #1976d2; color: white; padding: 4px 10px; border-radius: 999px; font-weight: bold; }

.stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.stat { background: #f7f7f7; padding: 7px 10px; border-radius: 8px; font-size: 13px; }
.travel-buttons { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
button { border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; }
.save-btn   { background: #2e7d32; color: white; }
.email-btn  { background: #1565c0; color: white; }
.clear-btn  { background: #757575; color: white; }
.add-btn    { background: #6a1b9a; color: white; }
.manual-btn { background: #e65100; color: white; }
.start-btn  { background: #2e7d32; color: white; }
.stop-btn   { background: #1565c0; color: white; }
.cancel-btn { background: #c62828; color: white; }
.edit-btn   { background: #f57c00; color: white; }
.delete-btn { background: #c62828; color: white; }

.trip-list { font-size: 13px; }
.trip-item { background: #fafafa; border-radius: 8px; padding: 8px; margin-top: 6px; }
.trip-item-btns { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
.guess-result {
  background: #e3f2fd; border-radius: 8px; padding: 10px; margin-top: 8px;
  font-size: 13px; border-left: 3px solid #1976d2; line-height: 1.6;
}

/* Coord Directory */
.coord-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.coord-table th {
  background: #f0f0f0; padding: 7px 8px; text-align: left;
  border-bottom: 1px solid #ddd; font-size: 12px; color: #555;
}
.coord-table td { padding: 5px 6px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
.coord-table input {
  width: 100%; border: 1px solid #ddd; border-radius: 6px;
  padding: 5px 7px; font-size: 13px; background: #fafafa;
}
.coord-table input:focus { outline: none; border-color: #1976d2; background: white; }
.coord-add-row { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
.coord-add-row input {
  flex: 1; min-width: 80px; padding: 7px 9px; border-radius: 8px;
  border: 1px solid #ccc; font-size: 13px;
}
.coord-save-btn { background: #1976d2; color: white; }
.coord-del-btn  { background: #e53935; color: white; padding: 5px 9px; font-size: 12px; }
.gps-btn        { background: #00838f; color: white; }

.feedback { background: white; margin: 10px; padding: 12px; border-radius: 10px; }
textarea {
  width: 100%; min-height: 100px; padding: 9px; border-radius: 8px;
  border: 1px solid #ccc; resize: vertical; font-family: Arial, sans-serif; font-size: 14px;
}
.feedback-buttons { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
#saveStatus { margin-top: 6px; font-size: 13px; color: #2e7d32; }

/* Modals */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55); z-index: 200;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white; border-radius: 16px 16px 0 0; padding: 20px;
  width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
}
.modal h3 { margin: 0 0 14px; font-size: 17px; }
.modal-field { margin-bottom: 12px; }
.modal-field label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #555; }
.modal-field input, .modal-field select {
  width: 100%; padding: 9px 10px; border-radius: 8px;
  border: 1px solid #ccc; font-size: 14px; background: white;
}
.modal-field .time-row { display: flex; gap: 8px; align-items: center; }
.modal-field .time-row input { width: 66px; text-align: center; }
.modal-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
.modal-actions .ok-btn  { background: #2e7d32; color: white; }
.modal-actions .no-btn  { background: #757575; color: white; }

/* Route add form */
.add-route-form { background: #f9f9f9; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
.add-route-form label { font-size: 12px; color: #555; font-weight: bold; display: block; margin-bottom: 3px; }
.add-route-form input, .add-route-form select {
  width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; margin-bottom: 8px; background: white;
}
.add-route-form .hint { font-size: 11px; color: #999; margin: -5px 0 8px; }
.form-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.form-row label { font-size: 13px; font-weight: bold; white-space: nowrap; }
.form-row select { flex:1; margin-bottom:0; padding: 8px 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; background: white; }
.form-row input  { flex:1; margin-bottom:0; padding: 8px 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }

/* Add Trip Modal specific styles */
.interval-item {
  background: #f8f9fa; border: 1px solid #eee; border-radius: 8px;
  padding: 10px; margin-bottom: 8px; font-size: 13px;
}
.interval-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; }
.interval-loc { color: #1565c0; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
.interval-btns { display: flex; gap: 5px; }
.selection-box {
  background: #fff9c4; padding: 10px; border-radius: 8px; margin-bottom: 15px;
  font-size: 13px; border: 1px solid #fbc02d;
}
.refresh-btn {
  background: #eee; color: #444; border: 1px solid #ccc;
  padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px;
}
</style>
</head>
<body>

<div id="stations"></div>

<!-- Travel Routes Modal -->
<div class="modal-overlay" id="routesModal">
  <div class="modal" style="max-height: 95vh;">

    <div class="add-route-form" id="addRouteForm" style="display:none;">
      <p style="font-size:12px;color:#555;margin:0 0 10px;">
        Use single words (no spaces) for From/To — e.g. <em>Home</em>, <em>Work</em>.<br>
        If label matches a Coord Directory entry, its GPS is used automatically.
      </p>
      <div class="form-row">
        <label>From</label>
        <input type="text" id="routeFrom" placeholder="Home" oninput="onRouteEndpointInput('from')">
      </div>
      <div id="fromCoordHint" style="font-size:11px;color:#2e7d32;margin:-4px 0 8px 0;padding-left:4px;display:none;"></div>
      <div class="form-row">
        <label>To</label>
        <input type="text" id="routeTo" placeholder="Work" oninput="onRouteEndpointInput('to')">
      </div>
      <div id="toCoordHint" style="font-size:11px;color:#1565c0;margin:-4px 0 8px 0;padding-left:4px;display:none;"></div>
      <div class="form-row">
        <label>Via</label>
        <input type="text" id="routeVia" placeholder="DT Bendemeer (optional)">
      </div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="save-btn" onclick="confirmAddRoute()">Save Route</button>
        <button class="cancel-btn" onclick="hideAddRouteForm()">Cancel</button>
      </div>
    </div>

    <div id="travelTracker" style="max-height: 70vh; overflow-y: auto;"></div>

    <div class="modal-actions">
      <button class="add-btn" onclick="showAddRouteForm()">+ Add Route</button>
      <button class="no-btn" onclick="closeRoutesModal()">Close</button>
    </div>
  </div>
</div>

<!-- Coord Directory Modal -->
<div class="modal-overlay" id="coordModal">
  <div class="modal" style="max-height: 95vh;">

    <div id="coordTableWrap" style="max-height: 50vh; overflow-y: auto; margin-bottom: 15px;"></div>

    <div class="coord-add-row">
      <input type="text"   id="newCoordLabel"  placeholder="Label (e.g. Home)" style="max-width:110px;">
      <input type="text"   id="newCoordLatLng" placeholder="1.3521,103.8198">
      <button class="gps-btn"        onclick="fillCurrentCoordField()">📡 GPS</button>
      <button class="coord-save-btn" onclick="addCoord()">+ Add</button>
    </div>
    <div id="coordStatus" style="font-size:12px;color:#2e7d32;margin-top:6px;"></div>

    <div class="modal-actions" style="margin-top: 20px;">
      <button class="no-btn" onclick="closeCoordModal()">Close</button>
    </div>
  </div>
</div>

<div class="feedback">
  <h3 style="margin:0 0 8px;">Wrong info? (tap door row to prefill)</h3>
  <textarea id="feedbackText" placeholder="Example:&#10;Lavender towards Pasir Ris should be Door 3"></textarea>
  <div class="feedback-buttons">
    <button class="save-btn"  onclick="saveFeedback()">Save</button>
    <button class="email-btn" onclick="sendUpdate()">Send Update</button>
    <button class="clear-btn" onclick="clearFeedback()">Clear</button>
  </div>
  <div id="saveStatus"></div>
</div>

<div class="header">
  <div class="line-buttons" id="lineButtons"></div>
  <div style="padding: 0 10px 10px; display: flex; gap: 8px;">
    <button class="add-btn" style="flex: 1;" onclick="openAddTripModal()">+ Trip</button>
    <button class="gps-btn" style="flex: 1;" onclick="openCoordModal()">📍 Coords</button>
    <button class="save-btn" style="flex: 1; background: #6a1b9a;" onclick="openRoutesModal()">🛤️ Routes</button>
  </div>
</div>

<!-- Add Trip Modal -->
<div class="modal-overlay" id="addTripModal">
  <div class="modal" style="max-height: 95vh;">

    <div id="intervalsList" style="max-height: 35vh; overflow-y: auto; margin-bottom: 15px; border: 1px solid #eee; border-radius: 8px;">
      <!-- Intervals will be rendered here -->
    </div>

    <div class="selection-box" id="tripSelection">
      <div><strong>Departure:</strong> <span id="selStartText">none</span></div>
      <div style="margin-top:4px;"><strong>Arrival:</strong> <span id="selEndText">none</span></div>
    </div>

    <div class="modal-field">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
        <label style="margin:0;">Assign to Route</label>
        <button class="add-btn" style="padding:2px 8px; font-size:11px;" onclick="closeAddTripModal(); openRoutesModal(); showAddRouteForm();">+ Add Route</button>
      </div>
      <select id="tripRouteSelect">
        <option value="">-- pick route --</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="manual-btn" style="background:#00838f;" onclick="reResolveLabels()" title="Re-resolve all labels from directory">↻ Labels</button>
      <button class="clear-btn" onclick="clearAllIntervals()">Clear All</button>
      <div style="flex:1"></div>
      <button class="no-btn" onclick="closeAddTripModal()">Close</button>
      <button class="ok-btn" onclick="saveTrip()">Save Trip</button>
    </div>
  </div>
</div>

<!-- Manual / Edit modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-field">
      <label>Date</label>
      <input type="date" id="modalDate">
    </div>
    <div class="modal-field">
      <label>Time (24h)</label>
      <div class="time-row">
        <input type="number" id="modalHour" min="0" max="23" placeholder="HH">
        <span style="font-size:13px;">hrs</span>
        <input type="number" id="modalMin"  min="0" max="59" placeholder="MM">
        <span style="font-size:13px;">mins</span>
      </div>
    </div>
    <div class="modal-field">
      <label>Duration (minutes)</label>
      <input type="number" id="modalDuration" min="1" placeholder="e.g. 25">
    </div>
    <div class="modal-actions">
      <button class="no-btn" onclick="closeModal()">Cancel</button>
      <button class="ok-btn" onclick="confirmModal()">Save</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════
   MRT DATA
═══════════════════════════ */
const mrtData = {
  EW: { color:'#2e9b43', stations:[
    { name:'Lavender',   directions:[{to:'Pasir Ris',door:'2'},{to:'Tuas Link',door:'10'}] },
    { name:'Paya Lebar', directions:[{to:'Pasir Ris',door:'11'},{to:'Tuas Link',door:'14'}] }
  ]},
  NS: { color:'#d32f2f', stations:[
    { name:'Orchard', directions:[{to:'Jurong East',door:'3'},{to:'Marina South Pier',door:'8'}] }
  ]},
  CC: { color:'#f59e0b', stations:[
    { name:'Paya Lebar', directions:[{to:'HarbourFront',door:'2'},{to:'Dhoby Ghaut',door:'7'}] },
    { name:'Macpherson', directions:[{to:'HarbourFront',door:'6'},{to:'Dhoby Ghaut',door:'6'}] }
  ]},
  DT: { color:'#005ec4', stations:[
    { name:'Bendemeer',     directions:[{to:'Expo',door:'8'},{to:'Bukit Panjang',door:'5'}] },
    { name:'Bukit Panjang', directions:[{to:'Expo',door:'?'},{to:'Bukit Panjang',door:'7'}] },
    { name:'Bugis',         directions:[{to:'Expo',door:'6'},{to:'Bukit Panjang',door:'?'}] },
    { name:'Ubi',           directions:[{to:'Expo',door:'8'},{to:'Bukit Panjang',door:'?'}] }
  ]}
};
let currentLine = 'EW';

/* ═══════════════════════════
   COORD DIRECTORY
   stored as [{label, latlng:"lat,lng"}]
═══════════════════════════ */
let coordDir = JSON.parse(localStorage.getItem('coord_dir_v2') || 'null');
if (!coordDir) {
  coordDir = [
    { label:'Home',      latlng:'1.3521,103.8198' },
    { label:'Work',      latlng:'1.2966,103.8549' },
    { label:'Playfacto', latlng:'1.3316,103.7436' }
  ];
  saveCoords();
}

function saveCoords() { localStorage.setItem('coord_dir_v2', JSON.stringify(coordDir)); }

function parseLatLng(str) {
  if (!str) return null;
  const parts = str.split(',').map(s => parseFloat(s.trim()));
  if (parts.length < 2 || isNaN(parts[0]) || isNaN(parts[1])) return null;
  return { lat: parts[0], lng: parts[1] };
}

function coordByLabel(label) {
  if (!label) return null;
  const l = label.trim().toLowerCase();
  return coordDir.find(c => c.label.toLowerCase() === l) || null;
}

function upsertCoord(label, latlng) {
  const existing = coordByLabel(label);
  if (existing) { existing.latlng = latlng; }
  else { coordDir.push({ label, latlng }); }
  saveCoords();
  renderCoordTable();
}

function renderCoordTable() {
  const wrap = document.getElementById('coordTableWrap');
  if (!coordDir.length) { wrap.innerHTML = '<p style="color:#999;font-size:13px;">No locations saved.</p>'; return; }
  let rows = coordDir.map((c, i) => `
    <tr>
      <td><input value="${c.label}" onchange="coordDir[${i}].label=this.value.trim();saveCoords();renderRoutes()" placeholder="Label" style="max-width:90px;"></td>
      <td><input value="${c.latlng}" onchange="coordDir[${i}].latlng=this.value.trim();saveCoords()" placeholder="lat,lng"></td>
      <td><button class="coord-del-btn" onclick="deleteCoord(${i})">✕</button></td>
    </tr>`).join('');
  wrap.innerHTML = `<table class="coord-table">
    <thead><tr><th>Label</th><th>lat,lng</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

function addCoord() {
  const label  = document.getElementById('newCoordLabel').value.trim();
  const latlng = document.getElementById('newCoordLatLng').value.trim();
  if (!label)  { alert('Enter a label'); return; }
  if (!parseLatLng(latlng)) { alert('Enter coords as lat,lng  e.g. 1.3521,103.8198'); return; }
  if (/\s/.test(label)) { alert('Label must be one word (no spaces)'); return; }
  upsertCoord(label, latlng);
  document.getElementById('newCoordLabel').value  = '';
  document.getElementById('newCoordLatLng').value = '';
}

function deleteCoord(i) {
  if (!confirm(`Delete "${coordDir[i].label}"?`)) return;
  coordDir.splice(i, 1); saveCoords(); renderCoordTable();
}

function fillCurrentCoordField() {
  const st = document.getElementById('coordStatus');
  if (!navigator.geolocation) { st.textContent = 'Geolocation not supported'; return; }
  st.textContent = 'Getting GPS…';
  navigator.geolocation.getCurrentPosition(pos => {
    document.getElementById('newCoordLatLng').value =
      `${pos.coords.latitude.toFixed(6)},${pos.coords.longitude.toFixed(6)}`;
    st.textContent = `Got location`;
  }, err => { st.textContent = 'Error: ' + err.message; }, { timeout: 8000 });
}

/* ═══════════════════════════
   HAVERSINE
═══════════════════════════ */
function haversine(lat1,lng1,lat2,lng2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function nearestCoord(lat, lng) {
  let best=null, bestD=Infinity;
  coordDir.forEach(c => {
    const p = parseLatLng(c.latlng);
    if (!p) return;
    const d = haversine(lat,lng,p.lat,p.lng);
    if (d < bestD) { bestD=d; best=c; }
  });
  return best ? { coord:best, dist:bestD } : null;
}

/* ═══════════════════════════
   TRAVEL ROUTES
═══════════════════════════ */
let travelRoutes = JSON.parse(localStorage.getItem('travel_routes') || '[]');

function saveRoutes() { localStorage.setItem('travel_routes', JSON.stringify(travelRoutes)); }

/* Add Route Form */
function showAddRouteForm() {
  document.getElementById('addRouteForm').style.display = 'block';
  document.getElementById('routeFrom').value = '';
  document.getElementById('routeTo').value   = '';
  document.getElementById('routeVia').value  = '';
  document.getElementById('fromCoordHint').style.display = 'none';
  document.getElementById('toCoordHint').style.display   = 'none';
  document.getElementById('routeFrom').focus();
}
function hideAddRouteForm() {
  document.getElementById('addRouteForm').style.display = 'none';
}

function onRouteEndpointInput(which) {
  const val   = document.getElementById(which === 'from' ? 'routeFrom' : 'routeTo').value.trim();
  const hintEl= document.getElementById(which === 'from' ? 'fromCoordHint' : 'toCoordHint');
  const match = coordByLabel(val);
  if (match) {
    hintEl.textContent = `✓ "${match.label}" found in directory → ${match.latlng}`;
    hintEl.style.display = 'block';
  } else {
    hintEl.style.display = 'none';
  }
}

function confirmAddRoute() {
  const from = document.getElementById('routeFrom').value.trim();
  const to   = document.getElementById('routeTo').value.trim();
  const via  = document.getElementById('routeVia').value.trim();
  if (!from || !to) { alert('Enter From and To'); return; }
  if (/\s/.test(from)||/\s/.test(to)) { alert('From/To must be single words (no spaces)'); return; }

  const name = via ? `${from} to ${to} via ${via}` : `${from} to ${to}`;

  // Auto-set coords from directory
  const fromCoord = coordByLabel(from);
  const toCoord   = coordByLabel(to);

  const route = {
    name, from, to, via,
    trips: []
  };

  travelRoutes.unshift(route);
  saveRoutes(); renderRoutes();
  hideAddRouteForm();
}

function deleteTrip(routeIndex, tripIndex) {
  if (!confirm('Delete this sample?')) return;
  travelRoutes[routeIndex].trips.splice(tripIndex,1); saveRoutes(); renderRoutes();
}
function deleteRoute(index) {
  if (!confirm(`Delete route "${travelRoutes[index].name}" and all trips?`)) return;
  travelRoutes.splice(index,1); saveRoutes(); renderRoutes();
}

function renameRoute(index) {
  const oldName = travelRoutes[index].name;
  const newName = prompt('Enter new name for route:', oldName);
  if (newName && newName.trim() !== '' && newName !== oldName) {
    travelRoutes[index].name = newName.trim();
    saveRoutes();
    renderRoutes();
  }
}


/* ═══════════════════════════
   RENDER STATIONS
═══════════════════════════ */
function render() {
  const lb = document.getElementById('lineButtons');
  lb.innerHTML = '';
  Object.entries(mrtData).forEach(([key,line]) => {
    const btn = document.createElement('button');
    btn.className='line-btn'+(key===currentLine?' active':'');
    btn.textContent=key; btn.style.background=line.color;
    btn.onclick=()=>{ currentLine=key; render(); };
    lb.appendChild(btn);
  });
  const st = document.getElementById('stations');
  st.innerHTML='';
  mrtData[currentLine].stations.forEach(station => {
    const div=document.createElement('div'); div.className='station';
    let rows=station.directions.map(d=>`
      <div class="row" onclick="quickFeedback('${station.name}','${d.to}')">
        <div>${d.to}</div><div class="door">Door ${d.door}</div>
      </div>`).join('');
    div.innerHTML=`<div class="station-name">${station.name}</div>${rows}`;
    st.appendChild(div);
  });
}

/* ═══════════════════════════
   RENDER ROUTES
═══════════════════════════ */
function calcStats(trips) {
  if (!trips.length) return {min:'-',avg:'-',max:'-'};
  const ms=trips.map(t=>t.mins);
  return {min:Math.min(...ms),avg:Math.round(ms.reduce((a,b)=>a+b,0)/ms.length),max:Math.max(...ms)};
}

function renderRoutes() {
  const c=document.getElementById('travelTracker');
  c.innerHTML='';
  if (!travelRoutes.length) {
    c.innerHTML='<div style="color:#999;font-size:13px;">No routes yet — tap + Add Route</div>'; return;
  }
  travelRoutes.forEach((route,index) => {
    const stats=calcStats(route.trips);
    const div=document.createElement('div'); div.className='travel-card';
    const tripsHtml=route.trips.slice(0,10).map((trip,ti)=>`
      <div class="trip-item">
        <div>${trip.mins} min — ${new Date(trip.start).toLocaleString()}</div>
        <div class="trip-item-btns">
          <button class="edit-btn" onclick="openEditModal(${index},${ti})">Edit</button>
          <button class="delete-btn" onclick="deleteTrip(${index},${ti})">Delete</button>
        </div>
      </div>`).join('');
    div.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div class="travel-title" style="margin-bottom:4px; flex: 1; cursor: pointer;" onclick="renameRoute(${index})">${route.name} ✏️</div>
        <button class="delete-btn" style="padding:4px 9px;font-size:12px;" onclick="deleteRoute(${index})">✕</button>
      </div>
      <div class="stats" style="margin-top:8px;">
        <div class="stat">avg ${stats.avg} m, ${stats.min} to ${stats.max}</div>
        <div class="stat">n=${route.trips.length}</div>
      </div>
      <div class="travel-buttons">
        <button class="manual-btn" style="flex:1;" onclick="openManualModal(${index})">+ Manual</button>
      </div>
      <div class="trip-list">${tripsHtml}</div>`;
    c.appendChild(div);
  });
}

/* ═══════════════════════════
   MANUAL/EDIT MODAL
═══════════════════════════ */
let _mMode=null,_mRoute=null,_mTrip=null;
function todayISO(){ return new Date().toISOString().slice(0,10); }

function openManualModal(ri) {
  _mMode='manual';_mRoute=ri;_mTrip=null;
  const now=new Date();
  document.getElementById('modalDate').value=todayISO();
  document.getElementById('modalHour').value=now.getHours();
  document.getElementById('modalMin').value=now.getMinutes();
  document.getElementById('modalDuration').value='';
  document.getElementById('modalOverlay').classList.add('open');
}
function openEditModal(ri,ti) {
  _mMode='edit';_mRoute=ri;_mTrip=ti;
  const trip=travelRoutes[ri].trips[ti], d=new Date(trip.start);
  document.getElementById('modalDate').value=d.toISOString().slice(0,10);
  document.getElementById('modalHour').value=d.getHours();
  document.getElementById('modalMin').value=d.getMinutes();
  document.getElementById('modalDuration').value=trip.mins;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function confirmModal() {
  const ds=document.getElementById('modalDate').value;
  const h=parseInt(document.getElementById('modalHour').value,10);
  const m=parseInt(document.getElementById('modalMin').value,10);
  const dur=parseInt(document.getElementById('modalDuration').value,10);
  if(!ds){alert('Enter date');return;}
  if(isNaN(h)||h<0||h>23){alert('Enter hour 0-23');return;}
  if(isNaN(m)||m<0||m>59){alert('Enter minutes 0-59');return;}
  if(isNaN(dur)||dur<1){alert('Enter duration ≥1 min');return;}
  const iso=new Date(`${ds}T${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00`).toISOString();
  const r=travelRoutes[_mRoute];
  if(_mMode==='manual') r.trips.unshift({start:iso,mins:dur});
  else r.trips[_mTrip]={start:iso,mins:dur};
  saveRoutes(); renderRoutes(); closeModal();
}

/* ═══════════════════════════
   ADD TRIP MODAL LOGIC
═══════════════════════════ */
let selectedStart = null; // { interval, time }
let selectedEnd = null;   // { interval, time }

function openAddTripModal() {
  trackLocation();
  selectedStart = JSON.parse(localStorage.getItem('mrt_selected_start') || 'null');
  selectedEnd = JSON.parse(localStorage.getItem('mrt_selected_end') || 'null');
  updateSelectionUI();

  const sel = document.getElementById('tripRouteSelect');
  sel.innerHTML = '<option value="">-- pick route --</option>';
  travelRoutes.forEach((r,i) => {
    const opt = document.createElement('option');
    opt.value=i; opt.textContent=r.name; sel.appendChild(opt);
  });

  renderRecordedIntervals();
  document.getElementById('addTripModal').classList.add('open');
}

function closeAddTripModal() {
  document.getElementById('addTripModal').classList.remove('open');
}

function updateSelectionUI() {
  document.getElementById('selStartText').textContent = selectedStart
    ? `${new Date(selectedStart.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`
    : 'none';
  document.getElementById('selEndText').textContent = selectedEnd
    ? `${new Date(selectedEnd.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`
    : 'none';
}

function renderRecordedIntervals() {
  const list = document.getElementById('intervalsList');
  if (!recordedIntervals.length) {
    list.innerHTML = '<div style="color:#999;text-align:center;padding:20px;">No records yet</div>';
    return;
  }

  list.innerHTML = recordedIntervals.map((inv, i) => {
    const start = new Date(inv.startTime);
    const end = new Date(inv.endTime);
    const dateStr = start.toLocaleDateString([], { day:'2-digit', month:'short' });
    const sStr = start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    const eStr = end.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    return `
      <div class="interval-item">
        <div class="interval-header">
          <span>${dateStr}</span>
          <span style="display:flex; align-items:center; gap:5px;">
            ${sStr} - ${eStr}
          </span>
        </div>
        <div class="interval-loc">
          <div style="flex:1;">
            <div style="font-weight:bold;">📍 ${inv.locLabel}</div>
            <div style="font-size:10px; color:#888;">${inv.lat.toFixed(6)}, ${inv.lng.toFixed(6)}</div>
          </div>
          <button class="refresh-btn" onclick="refreshInterval(event, ${i})" title="Refresh Nearest Label">↺</button>
        </div>
        <div class="interval-btns">
          <button class="start-btn"  style="padding:4px 8px; font-size:12px;" onclick="setTripStart(${i})">Set Start</button>
          <button class="stop-btn"   style="padding:4px 8px; font-size:12px;" onclick="setTripEnd(${i})">Set End</button>
          <button class="manual-btn" style="padding:4px 8px; font-size:12px; background:#e65100;" onclick="addToDir(${i})">Add to Dir</button>
          <button class="delete-btn" style="padding:4px 8px; font-size:12px;" onclick="deleteInterval(${i})">🗑️</button>
        </div>
      </div>
    `;
  }).join('');
}

function setTripStart(i) {
  const inv = recordedIntervals[i];
  // Start of trip is when we LEAVE the starting location (endTime of interval)
  const d = new Date(inv.endTime);
  const defaultStr = d.toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit' });
  const val = prompt('Departure time (HH:MM):', defaultStr);
  if (!val) return;
  const parts = val.split(':');
  if (parts.length !== 2) return;
  const h = parseInt(parts[0], 10), m = parseInt(parts[1], 10);
  if (isNaN(h) || h < 0 || h > 23 || isNaN(m) || m < 0 || m > 59) return;
  d.setHours(h); d.setMinutes(m); d.setSeconds(0);
  selectedStart = { interval: inv, time: d.toISOString() };
  localStorage.setItem('mrt_selected_start', JSON.stringify(selectedStart));
  updateSelectionUI();
}

function setTripEnd(i) {
  const inv = recordedIntervals[i];
  // End of trip is when we ARRIVE at the destination (startTime of interval)
  const d = new Date(inv.startTime);
  const defaultStr = d.toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit' });
  const val = prompt('Arrival time (HH:MM):', defaultStr);
  if (!val) return;
  const parts = val.split(':');
  if (parts.length !== 2) return;
  const h = parseInt(parts[0], 10), m = parseInt(parts[1], 10);
  if (isNaN(h) || h < 0 || h > 23 || isNaN(m) || m < 0 || m > 59) return;
  d.setHours(h); d.setMinutes(m); d.setSeconds(0);
  selectedEnd = { interval: inv, time: d.toISOString() };
  localStorage.setItem('mrt_selected_end', JSON.stringify(selectedEnd));
  updateSelectionUI();
}

function addToDir(i) {
  const inv = recordedIntervals[i];
  closeAddTripModal();
  openCoordModal(); // Must open the modal so we can see the input
  document.getElementById('newCoordLatLng').value = `${inv.lat.toFixed(6)},${inv.lng.toFixed(6)}`;
  const labelInput = document.getElementById('newCoordLabel');
  labelInput.scrollIntoView({ behavior:'smooth', block:'center' });
  setTimeout(() => labelInput.focus(), 500);
}

function refreshInterval(e, i) {
  const inv = recordedIntervals[i];
  if (inv.lat == null || inv.lng == null) {
    if (!navigator.geolocation) return;
    const btn = e.currentTarget;
    const oldText = btn.textContent;
    btn.textContent = '…';
    navigator.geolocation.getCurrentPosition(pos => {
      inv.lat = pos.coords.latitude;
      inv.lng = pos.coords.longitude;
      const nearest = nearestCoord(inv.lat, inv.lng);
      inv.locLabel = (nearest && nearest.dist <= 0.5) ? nearest.coord.label : "unknown";
      saveIntervals();
      renderRecordedIntervals();
      btn.textContent = oldText;
    }, err => { alert('GPS Error: ' + err.message); btn.textContent = oldText; }, { timeout: 10000 });
  } else {
    const nearest = nearestCoord(inv.lat, inv.lng);
    inv.locLabel = (nearest && nearest.dist <= 0.5) ? nearest.coord.label : "unknown";
    inv.locLabel = (nearest && nearest.dist <= 0.5) ? nearest.coord.label : "unknown";
    saveIntervals();
    renderRecordedIntervals();
  }
}

function reResolveLabels() {
  recordedIntervals.forEach(inv => {
    const nearest = nearestCoord(inv.lat, inv.lng);
    inv.locLabel = (nearest && nearest.dist <= 0.5) ? nearest.coord.label : "unknown";
  });
  saveIntervals();
  renderRecordedIntervals();
  updateSelectionUI();
}

function deleteInterval(i) {
  if (!confirm('Delete this record?')) return;
  recordedIntervals.splice(i, 1);
  saveIntervals();
  renderRecordedIntervals();
}

function clearAllIntervals() {
  if (!confirm('Clear all recorded locations?')) return;
  recordedIntervals = [];
  saveIntervals();
  renderRecordedIntervals();
  selectedStart = null;
  selectedEnd = null;
  localStorage.removeItem('mrt_selected_start');
  localStorage.removeItem('mrt_selected_end');
  updateSelectionUI();
}

function saveTrip() {
  const routeIndex = parseInt(document.getElementById('tripRouteSelect').value);
  if (isNaN(routeIndex)) { alert('Pick a route'); return; }
  if (!selectedStart || !selectedEnd) { alert('Select both start and end records'); return; }

  const startTime = new Date(selectedStart.time);
  const endTime = new Date(selectedEnd.time);

  if (endTime < startTime) {
    if (!confirm('End record is older than start record. Save anyway?')) return;
  }

  const mins = Math.max(1, Math.round((endTime - startTime) / 60000));

  travelRoutes[routeIndex].trips.unshift({
    start: selectedStart.time,
    mins: mins
  });

  saveRoutes();
  renderRoutes();
  closeAddTripModal();
}

/* ═══════════════════════════
   BACKGROUND TRACKING
═══════════════════════════ */
let recordedIntervals = JSON.parse(localStorage.getItem('mrt_intervals') || '[]');
function saveIntervals() { localStorage.setItem('mrt_intervals', JSON.stringify(recordedIntervals)); }

function trackLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const now = new Date();

    // Populate Coord Directory GPS field
    const gpsInput = document.getElementById('newCoordLatLng');
    if (gpsInput) gpsInput.value = `${lat.toFixed(6)},${lng.toFixed(6)}`;

    const nearest = nearestCoord(lat, lng);
    let locLabel = "unknown";
    if (nearest && nearest.dist <= 0.5) { // 500m = 0.5km
      locLabel = nearest.coord.label;
    }

    const last = recordedIntervals[0];
    const isSameDate = last && new Date(last.startTime).toDateString() === now.toDateString();
    const isSameLoc = last && last.locLabel === locLabel;

    if (last && isSameDate && isSameLoc) {
      last.endTime = now.toISOString();
    } else {
      recordedIntervals.unshift({
        startTime: now.toISOString(),
        endTime: now.toISOString(),
        locLabel: locLabel,
        lat: lat,
        lng: lng
      });
    }
    saveIntervals();
    if (document.getElementById('addTripModal').classList.contains('open')) {
      renderRecordedIntervals();
    }
  }, err => console.warn('Tracking error:', err), { timeout: 10000, enableHighAccuracy: true });
}

setInterval(trackLocation, 60000);
trackLocation();
