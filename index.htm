<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stumble Links</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.container {
    background:white;
    border-radius:12px;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    max-width:600px;
    width:100%;
    padding:40px;
}

h1 { text-align:center; margin-bottom:30px; }

.buttons { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }

button {
    padding:12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:600;
}

.btn-secondary { background:#e9ecef; }
.btn-danger { background:#ff6b6b; color:white; }

.links-table-section {
    margin-top:20px;
}

#linksTable {
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

#linksTable th, #linksTable td {
    padding:8px;
    border:1px solid #ddd;
}

.btn-small {
    padding:6px 10px;
    font-size:12px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
}
</style>
</head>

<body>
<div class="container">

<h1>🌍 Stumble Links</h1>

<div id="linkFreqContainer" style="display:none; margin-bottom:20px; gap:10px; align-items:flex-start;">
    <a id="linkDisplay" target="_blank" style="flex:1; font-weight:600;"></a>

    <div style="width:120px;">
        <label>Freq</label>
        <input id="frequencyInput" style="width:100%;">
    </div>
</div>

<div id="titleEditorContainer" style="display:none; margin-bottom:20px;">
    <textarea id="titleTextarea" style="width:100%; height:80px;"></textarea>
</div>

<div class="buttons" id="buttonContainer" style="display:none;">
    <button class="btn-secondary" onclick="laterLink()">Later</button>
    <button class="btn-secondary" onclick="snoozeCurrentLink()">Snooze</button>
    <button class="btn-danger" onclick="deleteCurrentLink()">Delete</button>
</div>

<div class="links-table-section">
    <button class="btn-small" onclick="exportToClipboard()">Copy</button>
    <button class="btn-small" onclick="importFromClipboard()">Paste</button>

    <table id="linksTable">
        <thead>
            <tr>
                <th>Snoozed</th>
                <th>Freq</th>
                <th>URL</th>
                <th>Title</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="linksTableBody"></tbody>
    </table>
</div>

</div>

<script>
const STORAGE_KEY = 'stumble_links';

let links = [];
let currentIndex = 0;

function init() {
    loadLinks();
    displayNextAvailable();
    updateLinksList();
}

function loadLinks() {
    const stored = localStorage.getItem(STORAGE_KEY);
    links = stored ? JSON.parse(stored) : [];
}

function saveLinks() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
}

function getAvailableLinks() {
    const today = new Date().toISOString().split('T')[0];
    return links.filter(l => !l.snoozed_until || l.snoozed_until <= today);
}

function displayNextAvailable() {
    const available = getAvailableLinks();

    if (!available.length) {
        document.getElementById('linkFreqContainer').style.display='none';
        document.getElementById('buttonContainer').style.display='none';
        document.getElementById('titleEditorContainer').style.display='none';
        return;
    }

    const next = available[0];
    currentIndex = links.findIndex(l => l.id === next.id);

    displayLink(next);
}

function displayLink(link) {
    document.getElementById('linkFreqContainer').style.display='flex';
    document.getElementById('buttonContainer').style.display='block';
    document.getElementById('titleEditorContainer').style.display='block';

    document.getElementById('linkDisplay').href = link.link;
    document.getElementById('linkDisplay').textContent = link.link;

    document.getElementById('titleTextarea').value = link.title;
    document.getElementById('frequencyInput').value = link.frequency;
}

function saveTitleAndFreq() {
    const link = links[currentIndex];
    link.title = document.getElementById('titleTextarea').value;
    link.frequency = document.getElementById('frequencyInput').value || '7';
    saveLinks();
}

function snoozeCurrentLink() {
    saveTitleAndFreq();

    const link = links[currentIndex];
    const d = new Date();

    if (link.frequency === 'M') {
        d.setMonth(d.getMonth()+1);
    } else {
        d.setDate(d.getDate() + (parseInt(link.frequency)||1));
    }

    link.snoozed_until = d.toISOString().split('T')[0];

    saveLinks();
    displayNextAvailable();
    updateLinksList();
}

function laterLink() {
    saveTitleAndFreq();

    const available = getAvailableLinks();
    if (available.length <= 1) return;

    const idx = available.findIndex(l => l.id === links[currentIndex].id);
    const next = available[(idx+1) % available.length];

    currentIndex = links.findIndex(l => l.id === next.id);
    displayLink(next);
}

function deleteCurrentLink() {
    links.splice(currentIndex,1);
    saveLinks();
    displayNextAvailable();
    updateLinksList();
}

function updateLinksList() {
    const body = document.getElementById('linksTableBody');

    body.innerHTML = links.map(l => `
        <tr>
            <td>${l.snoozed_until || ''}</td>
            <td>${l.frequency}</td>
            <td><a href="${l.link}" target="_blank">Open</a></td>
            <td>${l.title}</td>
            <td><button onclick="deleteLink(${l.id})">X</button></td>
        </tr>
    `).join('');
}

function deleteLink(id) {
    links = links.filter(l => l.id !== id);
    saveLinks();
    displayNextAvailable();
    updateLinksList();
}

function exportToClipboard() {
    const rows = [['Snoozed Until','Frequency','URL','Title'].join('\t')];

    links.forEach(l => {
        rows.push([
            l.snoozed_until || '',
            l.frequency,
            l.link,
            l.title
        ].join('\t'));
    });

    navigator.clipboard.writeText(rows.join('\n'));
}

function importFromClipboard() {
    navigator.clipboard.readText().then(text => {

        const lines = text.trim().split('\n');
        if (lines.length < 2) return;

        const headers = lines[0].split('\t');

        const snoozeIdx = headers.indexOf('Snoozed Until');
        const freqIdx = headers.indexOf('Frequency');
        const urlIdx = headers.indexOf('URL');
        const titleIdx = headers.indexOf('Title');

        const imported = [];

        for (let i=1;i<lines.length;i++) {
            const c = lines[i].split('\t');

            if (c[urlIdx]) {
                imported.push({
                    id: Date.now()+i,
                    snoozed_until: c[snoozeIdx] || null,
                    frequency: c[freqIdx] || '7',
                    link: c[urlIdx],
                    title: c[titleIdx] || 'Untitled'
                });
            }
        }

        // 🔥 overwrite
        links = imported;
        currentIndex = 0;

        saveLinks();
        displayNextAvailable();
        updateLinksList();
    });
}

window.onload = init;
</script>

</body>
</html>
