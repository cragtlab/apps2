<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stumble Links</title>


<style>
body { font-family:sans-serif; padding:0px; background:#f5f5f5; }
.container { margin:auto; background:white; padding:5px; border-radius:10px; }

button { padding:8px 12px; margin:3px; cursor:pointer; }
.btn-danger { background:#ff4d4d; color:white; }
.btn-add {    background:#28a745;color:white; }
#linkFreqContainer { display:none; gap:10px; margin-bottom:10px; }
#frequencyInput { width:60px; }
#linkFreqContainer button {
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
}
textarea { width:100%; height:80px; }

table { width:100%; border-collapse:collapse; margin-top:10px; }
td, th { border:1px solid #ddd; padding:6px; }

#linkDisplay{
    text-overflow: ellipsis;
    overflow: hidden;
}
small  {
    display: block;
    overflow-wrap: anywhere;
}
</style>
</head>

<body>
<div class="container">

<h2>🌍 Stumble Links</h2>

<!-- DISPLAY -->
<div id="linkFreqContainer">
    <input id="frequencyInput" placeholder="e.g. 2, W, M, Y">
    <button onclick="updateCurrentURL()">Update URL</button>
    <a id="linkDisplay" target="_blank" style="flex:1;"></a>
</div>

<div id="titleEditorContainer" style="display:none;">
    <textarea id="titleTextarea" placeholder="enter remarks"></textarea>
</div>

<div id="buttonContainer" style="display:none;">
    <button onclick="laterLink()">Later</button>
    <button onclick="snoozeCurrentLink()">Snooze</button>
    <button class="btn-danger" onclick="deleteCurrentLink()">Delete</button>
</div>

<!-- CONTROLS -->
 <hr>
<div>
    <button onclick="exportToClipboard()">Copy</button>
    <button onclick="importFromClipboard()">Paste</button>
    <button class="btn-add" onclick="addFromClipboard()">Add</button>
    <button onclick="sortLinks()">Sort</button>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Snoozed</th>
<th>Freq</th>
<th>Link</th>
</tr>
</thead>
<tbody id="linksTableBody"></tbody>
</table>

</div>

<script>
const STORAGE_KEY='stumble_links';
let links=[];
let currentIndex=0;

function init(){
    loadLinks();
    displayNextAvailable();
    updateLinksList();
}

function loadLinks(){
    links = JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
}

function saveLinks(){
    localStorage.setItem(STORAGE_KEY,JSON.stringify(links));
}

function getAvailableLinks(){
    const today=new Date().toISOString().split('T')[0];
    return links.filter(l=>!l.snoozed_until||l.snoozed_until<=today);
}

function displayNextAvailable(){
    const available=getAvailableLinks();
    if(!available.length){
        linkFreqContainer.style.display='none';
        titleEditorContainer.style.display='none';
        buttonContainer.style.display='none';
        return;
    }

    const next=available[0];
    currentIndex=links.findIndex(l=>l.id===next.id);
    displayLink(next);
}

function displayLink(link){
    linkFreqContainer.style.display='flex';
    titleEditorContainer.style.display='block';
    buttonContainer.style.display='block';

    linkDisplay.href=link.link;
    linkDisplay.textContent=link.link;

    titleTextarea.value=link.title||'';
    frequencyInput.value=link.frequency;
}
async function updateCurrentURL(){
    let clipboardText = '';

    try{
        clipboardText = (await navigator.clipboard.readText()).trim();
    }catch(e){
        // clipboard might fail (permissions)
    }

    let newUrl = clipboardText;

    // validate clipboard
    if(!newUrl || (!newUrl.startsWith('http') && !newUrl.startsWith('file'))){
        newUrl = '';
    }

    // prompt user
    const input = prompt(
        'Update URL (OK to confirm, Cancel to abort):',
        newUrl || links[currentIndex].link
    );

    if(input === null) return; // cancel

    const finalUrl = input.trim();
    if(!finalUrl) return;

    // update
    links[currentIndex].link = finalUrl;

    saveLinks();
    updateLinksList();
    displayLink(links[currentIndex]);
}

function saveCurrent(){
    const l=links[currentIndex];
    l.title=titleTextarea.value;
    l.frequency=frequencyInput.value||'2';
}

function openLink(link){
    const url = link.link?.trim() || '';

    // detect file links
    if (url.toLowerCase().startsWith('file://')){
        alert(
            'This is a local file link.\n\n' +
            'Please open it manually:\n\n' +
            url
        );
        return;
    }

    // normal web links
    setTimeout(() => {
        window.open(url, '_blank');
    }, 50);
}

/* FIXED FLOW */
function laterLink(){
    saveCurrent();

    const current = links[currentIndex];
    const available = getAvailableLinks();

    if (available.length === 0) return;

    let next = current;

    if (available.length > 1){
        const idx = available.findIndex(x => x.id === current.id);
        next = available[(idx + 1) % available.length];
    }

    // move UI FIRST
    currentIndex = links.findIndex(x => x.id === next.id);
    displayLink(next);

    // THEN open NEXT (not current)
    openLink(next);

    saveLinks();
}

/* FIXED FLOW */
function snoozeCurrentLink(){
    saveCurrent();

    const current = links[currentIndex];

    // snooze current
    const d = new Date();
    const freq = (current.frequency || '').toString().trim().toUpperCase();

if(!freq){
    d.setDate(d.getDate() + 1);
}
else if(!isNaN(freq)){
    // numeric → days
    d.setDate(d.getDate() + parseInt(freq));
}
else if(freq === 'M'){
    // monthly → same date next month
    d.setMonth(d.getMonth() + 1);
}
else if(freq === 'W'){
    // weekly
    d.setDate(d.getDate() + 7);
}
else if(freq === 'Y'){
    // yearly
    d.setFullYear(d.getFullYear() + 1);
}
else{
    // fallback → 1 day
    d.setDate(d.getDate() + 1);
}
    
    
    
    current.snoozed_until = d.toISOString().split('T')[0];

    saveLinks();
    updateLinksList();

    // recompute available AFTER snooze
    const available = getAvailableLinks();

    if (available.length === 0){
        displayNextAvailable();
        return;
    }

    const next = available[0];

    // move UI FIRST
    currentIndex = links.findIndex(x => x.id === next.id);
    displayLink(next);

    // THEN open NEXT
    openLink(next);
}

/* DELETE CURRENT */
function deleteCurrentLink(){
    if(!confirm('Delete this link?')) return;

    links.splice(currentIndex,1);
    saveLinks();
    displayNextAvailable();
    updateLinksList();
}

/* ADD */
function addFromClipboard(){
    navigator.clipboard.readText().then(text=>{

        let url=text.trim();

        // validate
        if(!url || (!url.startsWith('http') && !url.startsWith('file'))){
            url=prompt('Enter URL or file path:');
            if(!url) return;
        }

        const title = prompt(`Enter title for:\n${url}`);
        if(title===null) return;

        links.push({
            id:Date.now(),
            link:url,
            title:title||'',
            frequency:'2',
            snoozed_until:null
        });

        saveLinks();
        displayNextAvailable();
        updateLinksList();
    });
}

/* IMPORT OVERWRITE */
function importFromClipboard(){
    navigator.clipboard.readText().then(text=>{
        const rows = parseTSV(text);
        if(rows.length < 2) return;

        const h = rows[0];
        const s=h.indexOf('Snoozed Until');
        const f=h.indexOf('Frequency');
        const u=h.indexOf('URL');
        const t=h.indexOf('Title');

        const imported=[];

        for(let i=1;i<rows.length;i++){
            const c = rows[i];

            if(c[u]){
                imported.push({
                    id: Date.now()+i,
                    snoozed_until: s !== -1 ? decodeField(c[s]) : null,
		frequency: f !== -1 ? decodeField(c[f]) : '2',
		link: decodeField(c[u]),
		title: t !== -1 ? decodeField(c[t]) : ''
                });
            }
        }

        links=imported;
        currentIndex=0;

        saveLinks();
        displayNextAvailable();
        updateLinksList();
    });
}

function decodeField(value){
    try{
        return JSON.parse(value);
    }catch{
        return value?.trim() || '';
    }
}
function exportToClipboard(){
    const rows=[['Snoozed Until','Frequency','URL','Title']];

    links.forEach(l=>{
        rows.push([
            l.snoozed_until||'',
            l.frequency||'',
            l.link||'',
            l.title||''
        ]);
    });

    const tsv = rows.map(r => r.map(escapeTSV).join('\t')).join('\n');
    navigator.clipboard.writeText(tsv);
}
function parseTSV(text){
    const rows = [];
    let row = [];
    let field = '';
    let inQuotes = false;

    for(let i=0;i<text.length;i++){
        const char = text[i];
        const next = text[i+1];

        if(inQuotes){
            if(char === '"' && next === '"'){
                field += '"';
                i++;
            }else if(char === '"'){
                inQuotes = false;
            }else{
                field += char;
            }
        }else{
            if(char === '"'){
                inQuotes = true;
            }
            else if(char === '\t'){
                row.push(field);
                field = '';
            }
            else if(char === '\n'){
                row.push(field);
                rows.push(row);
                row = [];
                field = '';
            }
            else if(char === '\r'){
                // ignore (handles Windows \r\n)
            }
            else{
                field += char;
            }
        }
    }

    // push last field/row safely
    if(field !== '' || row.length){
        row.push(field);
        rows.push(row);
    }

    return rows;
}

function escapeTSV(value){
    value = value ?? '';
    value = value.toString();

    // escape quotes
    if(value.includes('"')){
        value = value.replace(/"/g, '""');
    }

    // wrap if needed (tabs, newline, quotes)
    if(value.includes('\t') || value.includes('\n') || value.includes('"')){
        value = `"${value}"`;
    }

    return value;
}
function encodeField(value){
    return JSON.stringify(value ?? '');
}
/* TABLE */
    function sortLinks(){
    links.sort((a,b)=>{
        // blank snooze goes first
        if(!a.snoozed_until && !b.snoozed_until) return 0;
        if(!a.snoozed_until) return -1;
        if(!b.snoozed_until) return 1;

        // both have dates → sort ascending
        return new Date(a.snoozed_until) - new Date(b.snoozed_until);
    });

    saveLinks();
    updateLinksList();
}
function updateLinksList(){
    linksTableBody.innerHTML=links.map(l=>`
        <tr>
            <td>
                ${l.snoozed_until||''}
                ${l.snoozed_until ? `<button onclick="clearSnooze(${l.id})">x</button>`:''}
            </td>
            <td>${l.frequency}</td>
            <td>
                <a href="${l.link}" target="_blank">
                    ${l.title||'(no title)'}
                </a><br>
                <small>${l.link}</small>
            </td>
        </tr>
    `).join('');
}

function clearSnooze(id){
    const l=links.find(x=>x.id===id);
    if(l){
        l.snoozed_until=null;
        saveLinks();
        displayNextAvailable();
        updateLinksList();
    }
}

window.onload=init;
</script>
</body>
</html>
