<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plugin Skeleton</title>
  <style>
    body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
    #tabBar {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: #333;
      padding: 5px;
      width: 160px;
      min-width: 160px;
    }
    .tabButton {
      background: #555; color: white; padding: 8px 16px; margin-bottom: 5px;
      border: none; cursor: pointer; text-align: left;
    }
    .tabButton.active { background: #007BFF; }
    #contentArea {
      flex-grow: 1;
      overflow: auto;
    }
    #contentArea > div { display: none; padding: 20px; }
    #contentArea > div.active { display: block; }
    .controlBtn {
      background: #777;
      color: white;
      padding: 8px 16px;
      border: none;
      margin-bottom: 10px;
      cursor: pointer;
      text-align: left;
    }
    #toolSearch {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
      width: 100%;
      box-sizing: border-box;
      display: none;
    }
    #toolOverlay {
      position: fixed;
      left: 170px;
      bottom: 10px;
      background: white;
      border: 1px solid #ccc;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
      z-index: 1000;
      width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      display: none;
      padding: 5px;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }
    #toolOverlay.active {
      display: grid;
    }
    .toolItem {
      padding: 8px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      color: #333;
    }
    .toolItem:hover {
      background: #f0f0f0;
    }
    .toolItem:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <div id="tabBar">
    <font color=white>Alt-L: Load, Alt-R: Refresh</font><br/>
    <font color=white>Alt-P: Pass mode</font><br/>
    <div id="passIndicator" style="color: yellow; margin: 5px 0; font-weight: bold; min-height: 20px; font-size: 14px;"></div>
    <div id="passLabelsList" style="color: white; font-size: 12px; margin-bottom: 10px; display: none; background: #444; padding: 5px; border-radius: 4px; max-height: 100px; overflow-y: auto;"></div>
    <button id="loadBtn" class="controlBtn">Load Plugins</button>
    <button id="refreshBtn" class="controlBtn">Refresh Plugins</button>
    <font color=white>Press Alt-1 to go 1st</font><br/>
    <input type="text" id="toolSearch" placeholder="Alt-S to search" autocomplete="off">
    <div id="toolOverlay"></div>
  </div>
  <div id="contentArea"></div>

  <script>
    let globalRootHandle = null;
    let toolsFiles = [];
    let isPassActive = false;
    let passBuffer = "";
    let lastCopiedText = "";
    const passData = [
      { color: "green", label: "MBS", value: "123456" },
      { color: "green", label: "RWS", value: "111111" },
      { color: "green", label: "Ops", value: "123456" }
    ];

    function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).catch(err => {
          fallbackCopyText(text);
        });
      } else {
        fallbackCopyText(text);
      }
    }

    function fallbackCopyText(text) {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.position = "fixed";
      textArea.style.left = "-9999px";
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      try {
        document.execCommand('copy');
      } catch (err) {
        console.error('Fallback copy failed', err);
      }
      document.body.removeChild(textArea);
    }

    function updatePassUI() {
      const indicator = document.getElementById("passIndicator");
      const labelsList = document.getElementById("passLabelsList");
      if (isPassActive) {
        indicator.textContent = `Pass for [${passBuffer}]`;
        indicator.style.color = "lightgreen";

        // Find matching or remaining items
        const candidates = passData.filter(item =>
          item.label.toLowerCase().startsWith(passBuffer.toLowerCase())
        );
        labelsList.style.display = "block";
        labelsList.innerHTML = candidates.map(item => `• ${item.label}`).join("<br/>");
      } else {
        indicator.textContent = lastCopiedText ? `Copied: ${lastCopiedText}` : "";
        indicator.style.color = "yellow";
        labelsList.style.display = "none";
        labelsList.innerHTML = "";
      }
    }

    const PluginAPI = {
      add: function(title) {
        const tabId = "tab_" + title.replace(/\s+/g, "_");
        const btn = document.createElement("button");
        btn.className = "tabButton";
	  btn.id=title;
        btn.innerText = title;
        btn.onclick = () => showTab(tabId);
        const tabBar = document.getElementById("tabBar");
        const toolSearch = document.getElementById("toolSearch");
        tabBar.insertBefore(btn, toolSearch);

        const div = document.createElement("div");
        div.id = tabId;
        document.getElementById("contentArea").appendChild(div);
        return div;
      },
      getRootHandle: function() {
        return globalRootHandle;
      }
    };

    function showTab(id) {
      document.querySelectorAll("#tabBar .tabButton").forEach(btn => btn.classList.remove("active"));
      document.querySelectorAll("#tabBar .tabButton").forEach(btn => {
        if (btn.innerText.replace(/\s+/g, "_") === id.replace("tab_", "")) btn.classList.add("active");
      });
      document.querySelectorAll("#contentArea > div").forEach(div => div.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    async function loadPluginsFromHandle(rootHandle) {
      const pluginFolderHandle = await rootHandle.getDirectoryHandle("pluginJS");
      for await (const entry of pluginFolderHandle.values()) {
        if (entry.kind === 'file' && entry.name.endsWith('.txt')) {
          const file = await entry.getFile();
          const text = await file.text();
          eval(text);
        }
      }
    }

    document.getElementById("loadBtn").onclick = async () => {
      try {
        globalRootHandle = await window.showDirectoryPicker({mode: 'readwrite'});
        await loadPluginsFromHandle(globalRootHandle);
        await updateToolsList();
        document.getElementById("toolSearch").style.display = "block";
      } catch (err) {
        console.error('Plugin loading failed:', err);
        alert(err);
      }
    };

    document.getElementById("refreshBtn").onclick = async () => {
      if (!globalRootHandle) {
        alert("Please load plugins first.");
        return;
      }
      document.querySelectorAll("#tabBar .tabButton").forEach(btn => btn.remove());
      document.getElementById("contentArea").innerHTML = "";
      await loadPluginsFromHandle(globalRootHandle);
      await updateToolsList();
    };

    async function updateToolsList() {
      if (!globalRootHandle) return;
      try {
        const toolsFolderHandle = await globalRootHandle.getDirectoryHandle("tools");
        toolsFiles = [];
        for await (const entry of toolsFolderHandle.values()) {
          if (entry.kind === "file") {
            toolsFiles.push(entry.name);
          }
        }
        toolsFiles.sort((a, b) => a.localeCompare(b));
      } catch (err) {
        console.error("Failed to load tools list:", err);
      }
    }

    function openTool(name) {
      window.open("tools/" + name, "_blank");
      const overlay = document.getElementById("toolOverlay");
      overlay.classList.remove("active");
      document.getElementById("toolSearch").value = "";
    }

    function renderTools(matches) {
      const overlay = document.getElementById("toolOverlay");
      overlay.innerHTML = "";
      if (matches.length > 0) {
        matches.forEach(match => {
          const div = document.createElement("div");
          div.className = "toolItem";
          div.textContent = match;
          div.onclick = () => openTool(match);
          overlay.appendChild(div);
        });
        overlay.classList.add("active");
      } else {
        overlay.classList.remove("active");
      }
    }

    document.getElementById("toolSearch").addEventListener("focus", function() {
      renderTools(toolsFiles);
    });

    document.getElementById("toolSearch").addEventListener("input", function() {
      const query = this.value.toLowerCase().trim();
      if (query === "") {
        renderTools(toolsFiles);
        return;
      }
      const matches = toolsFiles.filter(f => f.toLowerCase().includes(query));
      renderTools(matches);
    });

    document.addEventListener("click", function(e) {
      const search = document.getElementById("toolSearch");
      const overlay = document.getElementById("toolOverlay");
      if (e.target !== search && !overlay.contains(e.target)) {
        overlay.classList.remove("active");
      }
    });

    document.getElementById("toolSearch").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        const query = this.value.toLowerCase().trim();
        const matches = toolsFiles.filter(f => f.toLowerCase().includes(query));
        if (matches.length > 0) {
          openTool(matches[0]);
        }
      }
    });

async function ensureWritePermission(handle) {
  const opts = { mode: 'readwrite' };
  if ((await handle.queryPermission(opts)) === 'granted') return true;
  if ((await handle.requestPermission(opts)) === 'granted') return true;
  return false;
}
document.addEventListener("keydown", (e) => {
  // If pass mode is active, intercept standard keys (letters) for matching
  if (isPassActive) {
    if (e.key === "Escape") {
      e.preventDefault();
      isPassActive = false;
      passBuffer = "";
      lastCopiedText = ""; // reset the last copied text to empty / initial state
      updatePassUI();
      return;
    }
    if (e.key === "Backspace") {
      e.preventDefault();
      if (passBuffer.length > 0) {
        passBuffer = passBuffer.slice(0, -1);
        updatePassUI();
      }
      return;
    }
    // Check if a single character was typed (ignore modifiers or special keys like Tab, Enter, etc.)
    if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
      e.preventDefault();
      passBuffer += e.key;
      updatePassUI();

      // Find candidates that match the prefix case-insensitively
      const candidates = passData.filter(item =>
        item.label.toLowerCase().startsWith(passBuffer.toLowerCase())
      );

      if (candidates.length === 1) {
        // Exactly one unique match found!
        const matched = candidates[0];
        copyText(matched.value);
        lastCopiedText = matched.label;
        isPassActive = false;
        passBuffer = "";
        updatePassUI();
      } else if (candidates.length === 0) {
        // No match found - reset buffer or do nothing?
        // Typically, we reset or stay. Let's keep it but maybe flash or just reset.
        // We'll reset the buffer to empty to allow starting fresh if user typed a non-matching key.
        passBuffer = "";
        updatePassUI();
      }
      return;
    }
  }

  if (!e.altKey) return;

  if (e.code === 'KeyP') {
    e.preventDefault();
    isPassActive = true;
    passBuffer = "";
    // If we have an active input, blur it so keyboard input goes to document keydown
    if (document.activeElement) {
      document.activeElement.blur();
    }
    updatePassUI();
    return;
  }
  if (e.code === 'KeyL') {
    e.preventDefault();
    document.getElementById('loadBtn').click();
    return;
  }
  if (e.code === 'KeyR') {
    e.preventDefault();
    document.getElementById('refreshBtn').click();
    return;
  }
  if (e.code === 'KeyS') {
    e.preventDefault();
    document.getElementById('toolSearch').focus();
    return;
  }
  
  const index = parseInt(e.key) - 1;
  if (isNaN(index) || index < 0) return;

  const tabs = document.querySelectorAll("#tabBar .tabButton");
  if (tabs[index]) {
    e.preventDefault();
    tabs[index].click();
  }
});
  </script>
</body>
</html>
