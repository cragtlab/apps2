<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>2026WORK HTML</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
    font-family:Segoe UI;
    margin:20px;
}

button{
    padding:8px 15px;
    margin:5px;
}

table{
    border-collapse:collapse;
    width:100%;
}

td,th{
    border:1px solid #ccc;
    padding:4px;
}

#log{
    border:1px solid #ccc;
    height:180px;
    overflow:auto;
    padding:10px;
    background:#f7f7f7;
}

.loaded{
    color:green;
}

.notloaded{
    color:red;
}

input{
    padding:8px;
    width:400px;
}

.summary{
    margin-top:15px;
}
</style>
</head>
<body>

<h1>2026WORK HTML</h1>

<button id="pickFolder">Select Folder</button>
<button id="exportCombined">Export Combined</button>

<br><br>


<div class="summary">
<table id="summaryTable">
<thead>
<tr>
<th>Report</th>
<th>Status</th>
<th>Rows</th>
<th>File</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<br>

<div id="log"></div>

<br>

<h2>Search Results</h2>
<input id="searchBox" placeholder="Search all loaded reports">
<select id="officerFilter">
    <option value="">All Officers</option>
</select>

<div style="max-height:500px;overflow:auto;">
<table id="results">
<thead></thead>
<tbody></tbody>
</table>
</div>

<script>

//// Officer
const officerIndex = {};
const officerAliasMap = {};
function normalizeOfficer(raw) {
    if (!raw) return null;
if(true) return raw.trim().replaceAll("@gra.gov.sg","").replaceAll("_"," ");
    let name = String(raw)
        .toLowerCase()
        .trim();

    // remove emails → keep prefix name
    name = name.replace(/@.*$/, "");

    // replace separators
    name = name.replace(/[_\.]/g, " ");
    name = name.replace(/\s+/g, " ");

    // crude cleanup rules
    name = name.trim();

    // alias compression: first + last token
    const parts = name.split(" ").filter(Boolean);
    if (parts.length >= 2) {
        name = parts[0] + "_" + parts[parts.length - 1];
    } else {
        name = parts[0];
    }

    return name;
}
function findOfficerColumn(headerRow) {
    const targets = [
        "assigned eo",
        "assigned inspectors",
        "assigned inspector"
    ];

    for (let i = 0; i < headerRow.length; i++) {
        const h = String(headerRow[i]).toLowerCase().trim();

        if (targets.includes(h)) {
            return i;
        }
    }
    return -1;
}
function indexOfficers(reportName, rows) {
    if (!rows || rows.length === 0) return;

    const header = rows[0];
    const officerCol = findOfficerColumn(header);

    if (officerCol === -1) {
        log(`No officer column found in ${reportName}`);
        return;
    }

    for (let i = 1; i < rows.length; i++) {
        const row = rows[i];

        const rawOfficer = row[officerCol];
        const officer = normalizeOfficer(rawOfficer);

        if (!officer) continue;

        if (!officerIndex[officer]) {
            officerIndex[officer] = [];
        }

        officerIndex[officer].push({
            report: reportName,
            row
        });
    }
}
function refreshOfficerDropdown() {
    const sel = document.getElementById("officerFilter");

    sel.innerHTML = `<option value="">All Officers</option>`;

    const officers = Object.keys(officerIndex).sort();

    for (const o of officers) {
        const opt = document.createElement("option");
        opt.value = o;
        opt.textContent = `${o} (${officerIndex[o].length})`;
        sel.appendChild(opt);
    }
}
document.getElementById("officerFilter").onchange = (e) => {
    const officer = e.target.value;

    if (!officer) {
        renderResults([]); // or clear filter
        return;
    }

    renderResults(officerIndex[officer] || []);
};
//////
let folderHandle=null;

const reports={

    LJA_KPI_Report:null,
    GEGM_KPI_Report:null,
    EGM_KPI_Report:null,
    SDA_KPI_Report:null,
    "TA Report_":null
};

const loadedData={};

function log(msg)
{
    const div=document.getElementById("log");
    div.innerHTML+=msg+"<br>";
    div.scrollTop=div.scrollHeight;
}

document.getElementById("pickFolder").onclick=async()=>
{
    folderHandle=await window.showDirectoryPicker();
    log("Folder selected.");
    loadReports();
};

function extractNumber(filename)
{
    const m=filename.match(/\((\d+)\)/);

    if(m)
        return parseInt(m[1]);

    return 0;
}

function parseTAFile(filename)
{
    const m=filename.match(/TA Report_(\d{8})(?: \((\d+)\))?/i);

    if(!m)
        return null;

    return {
        date:m[1],
        copy:parseInt(m[2]||1)
    };
}

async function findLatestFiles()
{
    const found=[];

    for await(const [name,handle] of folderHandle.entries())
    {
        if(handle.kind!=="file")
            continue;

        found.push({
            name,
            handle
        });
    }

    for(const reportName in reports)
    {
        reports[reportName]=null;
    }

    for(const file of found)
    {
        const n=file.name;

        if(n.startsWith("TA Report_"))
        {
            if(!reports["TA Report_"])
            {
                reports["TA Report_"]=file;
            }
            else
            {
                const a=parseTAFile(reports["TA Report_"].name);
                const b=parseTAFile(file.name);

                if(b)
                {
                    if(
                        b.date>a.date ||
                        (b.date===a.date && b.copy>a.copy)
                    )
                    {
                        reports["TA Report_"]=file;
                    }
                }
            }

            continue;
        }

        for(const base of [
            "LJA_KPI_Report",
            "GEGM_KPI_Report",
            "EGM_KPI_Report",
            "SDA_KPI_Report"
        ])
        {
            if(!n.startsWith(base))
                continue;

            if(!reports[base])
            {
                reports[base]=file;
            }
            else
            {
                const oldNum=
                    extractNumber(reports[base].name);

                const newNum=
                    extractNumber(n);

                if(newNum>oldNum)
                {
                    reports[base]=file;
                }
            }
        }
    }
}

async function loadExcelFile(fileHandle)
{
    const file=await fileHandle.getFile();

    const buffer=await file.arrayBuffer();

    const workbook=XLSX.read(buffer);

    const sheet=
        workbook.Sheets[
            workbook.SheetNames[0]
        ];

    return XLSX.utils.sheet_to_json(
        sheet,
        {
            header:1,
            defval:""
        }
    );
}

async function loadReports(){
    if(!folderHandle)
    {
        alert("Select folder first.");
        return;
    }

    await findLatestFiles();

    const tbody=
        document.querySelector("#summaryTable tbody");

    tbody.innerHTML="";

    for(const reportName in reports)
    {
        const tr=document.createElement("tr");

        const report=reports[reportName];

        if(report)
        {
            log("Loading "+report.name);

            const data=
                await loadExcelFile(report.handle);

            loadedData[reportName]=data;
	// NEW: build officer index
indexOfficers(reportName, data);
            tr.innerHTML=`
                <td>${reportName}</td>
                <td class='loaded'>Loaded</td>
                <td>${Math.max(0,data.length-1)}</td>
                <td>${report.name}</td>
            `;
        }
        else
        {
            tr.innerHTML=`
                <td>${reportName}</td>
                <td class='notloaded'>Missing</td>
                <td>0</td>
                <td></td>
            `;
        }

        tbody.appendChild(tr);
    }
refreshOfficerDropdown();
    log("Finished loading.");
};

document.getElementById("searchBox").oninput=(e)=>
{
    const term=
        e.target.value.toLowerCase();

    const results=[];

    for(const reportName in loadedData)
    {
        const rows=loadedData[reportName];

        for(let i=0;i<rows.length;i++)
        {
            const row=rows[i];

            const text=
                JSON.stringify(row)
                .toLowerCase();

            if(text.includes(term))
            {
                results.push({
                    report:reportName,
                    row
                });

                if(results.length>300)
                    break;
            }
        }
    }

    renderResults(results);
};

function renderResults(rows)
{
    const head=
        document.querySelector("#results thead");

    const body=
        document.querySelector("#results tbody");

    head.innerHTML="";
    body.innerHTML="";

    if(rows.length===0)
        return;

    let maxCols=0;

    rows.forEach(r=>{
        maxCols=Math.max(
            maxCols,
            r.row.length
        );
    });

    let html="<tr><th>Report</th>";

    for(let i=0;i<maxCols;i++)
    {
        html+=`<th>${i+1}</th>`;
    }

    html+="</tr>";

    head.innerHTML=html;

    for(const r of rows)
    {
        const tr=document.createElement("tr");

        let rowHtml=
            `<td>${r.report}</td>`;

        for(let i=0;i<maxCols;i++)
        {
            rowHtml+=`
            <td>${r.row[i]||""}</td>`;
        }

        tr.innerHTML=rowHtml;

        body.appendChild(tr);
    }
}

document.getElementById("exportCombined").onclick=()=>
{
    const combined=[];

    for(const reportName in loadedData)
    {
        const rows=loadedData[reportName];

        if(rows.length===0)
            continue;

        combined.push([
            reportName
        ]);

        rows.forEach(r=>
            combined.push(r)
        );

        combined.push([]);
    }

    const wb=
        XLSX.utils.book_new();

    const ws=
        XLSX.utils.aoa_to_sheet(
            combined
        );

    XLSX.utils.book_append_sheet(
        wb,
        ws,
        "Combined"
    );

    XLSX.writeFile(
        wb,
        "CombinedReports.xlsx"
    );
};

</script>

</body>
</html>
