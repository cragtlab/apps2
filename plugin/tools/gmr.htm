<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMR Notification Processor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }
        h1 {
            color: #333;
        }
        #drop-zone {
            border: 2px dashed #007BFF;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            color: #007BFF;
            background-color: #fff;
            transition: background-color 0.3s;
            cursor: pointer;
            margin-bottom: 20px;
        }
        #drop-zone.dragover {
            background-color: #e1f5fe;
        }
        #output-container {
            position: relative;
        }
        textarea {
            width: 100%;
            height: 400px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            box-sizing: border-box;
            background-color: #fff;
        }
        .controls {
            margin-bottom: 10px;
            display: flex;
            justify-content: flex-end;
        }
        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #status {
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
        }
        .filters {
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            background: white;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .filters label {
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <h1>GMR Notification Processor</h1>
    <p>Drop an XLSX file containing GMR notifications to group them by type and venue.</p>

    <div id="drop-zone">
        Drag & Drop XLSX file here or click to select
        <input type="file" id="file-input" style="display: none;" accept=".xlsx">
    </div>

    <div class="filters">
        <label>Submission Date: From <input type="date" id="date-from"></label>
        <label>To <input type="date" id="date-to"></label>
    </div>

    <div id="output-container">
        <div class="controls">
            <button id="copy-btn">Copy to Clipboard</button>
        </div>
        <textarea id="output" placeholder="Output will appear here..." readonly></textarea>
    </div>

    <div id="status"></div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const output = document.getElementById('output');
        const copyBtn = document.getElementById('copy-btn');
        const status = document.getElementById('status');
        const dateFromInput = document.getElementById('date-from');
        const dateToInput = document.getElementById('date-to');

        let loadedDataRows = [];

        // Helper to format date as YYYY-MM-DD in local time
        function formatLocalDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // Default Date Range Logic
        function setDefaultDates() {
            const now = new Date();
            const year = now.getFullYear();

            // Period end dates: Apr 30, Jul 31, Oct 31, Jan 31
            const periods = [
                { start: [year, 1], end: [year, 3, 30], name: 'Feb-Apr' }, // Feb 1 to Apr 30
                { start: [year, 4], end: [year, 6, 31], name: 'May-Jul' }, // May 1 to Jul 31
                { start: [year, 7], end: [year, 9, 31], name: 'Aug-Oct' }, // Aug 1 to Oct 31
                { start: [year, 10], end: [year + 1, 0, 31], name: 'Nov-Jan' }, // Nov 1 to Jan 31
                { start: [year - 1, 10], end: [year, 0, 31], name: 'Nov-Jan-Prev' } // Nov 1 to Jan 31 (Prev)
            ];

            const endDates = periods.map(p => new Date(p.end[0], p.end[1], p.end[2]));

            let minDiff = Infinity;
            let closestPeriod = periods[0];

            endDates.forEach((d, i) => {
                const diff = Math.abs(now - d);
                if (diff < minDiff) {
                    minDiff = diff;
                    closestPeriod = periods[i];
                }
            });

            const startDate = new Date(closestPeriod.start[0], closestPeriod.start[1], 1); // Always 1st of month
            const endDate = new Date(closestPeriod.end[0], closestPeriod.end[1], closestPeriod.end[2]);

            dateFromInput.value = formatLocalDate(startDate);
            dateToInput.value = formatLocalDate(endDate);
        }

        setDefaultDates();

        dateFromInput.onchange = () => refreshOutput();
        dateToInput.onchange = () => refreshOutput();

        dropZone.onclick = () => fileInput.click();

        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        };

        dropZone.ondragleave = () => {
            dropZone.classList.remove('dragover');
        };

        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                processFile(e.dataTransfer.files[0]);
            }
        };

        fileInput.onchange = (e) => {
            if (e.target.files.length) {
                processFile(e.target.files[0]);
            }
        };

        copyBtn.onclick = () => {
            output.select();
            document.execCommand('copy');
            const originalText = copyBtn.textContent;
            copyBtn.textContent = 'Copied!';
            setTimeout(() => {
                copyBtn.textContent = originalText;
            }, 2000);
        };

        function parseExcelDate(val) {
            if (!val) return null;
            if (val instanceof Date) return val;
            if (typeof val === 'number') {
                // Correctly convert Excel serial to local Date
                // 1899-12-30 is the Excel epoch
                const d = new Date(1899, 11, 30);
                d.setDate(d.getDate() + val);
                return d;
            }
            const d = new Date(val);
            if (!isNaN(d.getTime())) return d;
            return null;
        }

        // Returns an integer YYYYMMDD for easier local comparison
        function getDateKey(date) {
            if (!date) return 0;
            const y = date.getFullYear();
            const m = date.getMonth() + 1;
            const d = date.getDate();
            return y * 10000 + m * 100 + d;
        }

        function processFile(file) {
            status.textContent = 'Loading ' + file.name + '...';
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];

                    const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                    if (rows.length < 2) {
                        output.value = "No data found in the spreadsheet (expected header and data).";
                        status.textContent = 'Finished.';
                        return;
                    }

                    const header = rows[0].map(h => String(h).trim());
                    loadedDataRows = rows.slice(1).map(r => {
                        const obj = {};
                        header.forEach((h, i) => {
                            obj[h] = r[i];
                        });
                        return obj;
                    });

                    refreshOutput();
                    status.textContent = 'File loaded. (' + loadedDataRows.length + ' rows total)';
                } catch (err) {
                    console.error(err);
                    output.value = "Error processing file: " + err.message;
                    status.textContent = 'Error occurred.';
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function refreshOutput() {
            if (!loadedDataRows.length) return;

            // Date inputs are already in YYYY-MM-DD local format
            const fromKey = parseInt(dateFromInput.value.replace(/-/g, ''));
            const toKey = parseInt(dateToInput.value.replace(/-/g, ''));

            const filteredRows = loadedDataRows.filter(row => {
                const subDateRaw = row['Submission Date'];
                const subDate = parseExcelDate(subDateRaw);
                if (!subDate) return true;

                const currentKey = getDateKey(subDate);
                return currentKey >= fromKey && currentKey <= toKey;
            });

            if (filteredRows.length === 0) {
                output.value = "No notifications found within the selected date range.";
                return;
            }

            const grouped = groupData(filteredRows);
            displayGroupedData(grouped);
        }

        function groupData(data) {
            const groups = {};

            data.forEach(row => {
                const rawType = row['Notification Type'] || 'Unknown Type';
                const type = String(rawType).trim();

                const venueBefore = String(row['Approved Gambling Venue (Before)'] || 'Unknown Venue').trim();
                const venueAfter = String(row['Approved Gambling Venue (After)'] || 'Unknown Venue').trim();

                let venueKey = '';
                if (type.toLowerCase().includes('transfer')) {
                    venueKey = `${venueBefore} -> ${venueAfter}`;
                } else if (type === 'Remove Machine') {
                    venueKey = venueBefore;
                } else {
                    venueKey = venueAfter;
                }

                if (!groups[type]) {
                    groups[type] = {
                        total: 0,
                        venues: {}
                    };
                }

                groups[type].total++;
                if (!groups[type].venues[venueKey]) {
                    groups[type].venues[venueKey] = 0;
                }
                groups[type].venues[venueKey]++;
            });

            return groups;
        }

        function displayGroupedData(groups) {
            let sections = [];

            const typeMapping = {
                'Add Machine': 'Machines Added',
                'Remove Machine': 'Machines Removed',
                'Modify Machine': 'Modifications'
            };

            const order = ['Add Machine', 'Remove Machine', 'Modify Machine'];
            const types = Object.keys(groups).sort((a, b) => {
                const idxA = order.indexOf(a);
                const idxB = order.indexOf(b);
                if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                if (idxA !== -1) return -1;
                if (idxB !== -1) return 1;
                return a.localeCompare(b);
            });

            types.forEach((type) => {
                const group = groups[type];
                const headerSuffix = typeMapping[type] || type;
                let section = `${group.total} ${headerSuffix}\n`;

                if (type === 'Modify Machine') {
                    section += '\n';
                }

                const sortedVenues = Object.keys(group.venues).sort();
                sortedVenues.forEach(venue => {
                    const count = group.venues[venue];
                    const unit = 'Machine';
                    const displayUnit = count === 1 ? unit : unit + 's';
                    section += `${venue} (${count} ${displayUnit})\n`;
                });
                sections.push(section.trim());
            });

            output.value = sections.join('\n\n');
        }
    </script>
</body>
</html>
