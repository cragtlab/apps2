<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diff Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.2.0/diff.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }
        h1 {
            color: #333;
        }
        .container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        textarea {
            height: 200px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
            resize: vertical;
        }
        #compare-btn {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }
        #compare-btn:hover {
            background-color: #0056b3;
        }
        #output {
            background-color: white;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            white-space: pre-wrap;
            min-height: 100px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1>Diff Tool</h1>
    <p>Enter original and new text to see the differences. Ideal for copying into emails.</p>

    <div class="container">
        <div class="input-group">
            <label for="oldText">Original Text</label>
            <textarea id="oldText" placeholder="Paste original text here..."></textarea>
        </div>
        <div class="input-group">
            <label for="newText">New Text</label>
            <textarea id="newText" placeholder="Paste new text here..."></textarea>
        </div>
    </div>

    <div style="display: flex; gap: 10px; align-items: center;">
        <button id="compare-btn">Compare</button>
        <button id="copy-btn" style="display:none; padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-bottom: 20px;">Copy Formatted</button>
    </div>

    <h2>Result</h2>
    <div id="output"></div>

    <script>
        const oldText = document.getElementById('oldText');
        const newText = document.getElementById('newText');
        const compareBtn = document.getElementById('compare-btn');
        const copyBtn = document.getElementById('copy-btn');
        const output = document.getElementById('output');

        compareBtn.onclick = () => {
            const diff = Diff.diffWords(oldText.value, newText.value);
            output.innerHTML = '';

            diff.forEach((part) => {
                const span = document.createElement(part.removed ? 'del' : 'span');
                if (part.added) {
                    span.style.color = 'red';
                } else if (part.removed) {
                    span.style.color = 'red';
                    span.style.textDecoration = 'line-through';
                }

                span.textContent = part.value;
                output.appendChild(span);
            });
            copyBtn.style.display = 'inline-block';
        };

        copyBtn.onclick = async () => {
            // Outlook Web often ignores 'white-space: pre-wrap' in pasted HTML,
            // so we replace newlines with <br> for the HTML version.
            const htmlWithBr = output.innerHTML.replace(/\n/g, '<br>');
            const html = `<html><body><div style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.5;">${htmlWithBr}</div></body></html>`;
            const text = output.textContent;

            try {
                const blobHtml = new Blob([html], { type: 'text/html' });
                const blobText = new Blob([text], { type: 'text/plain' });
                const data = [new ClipboardItem({
                    'text/html': blobHtml,
                    'text/plain': blobText
                })];

                await navigator.clipboard.write(data);

                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => copyBtn.textContent = originalText, 2000);
            } catch (err) {
                console.error('Failed to copy: ', err);
                // Fallback for some browsers/contexts
                const range = document.createRange();
                range.selectNode(output);
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
                try {
                    document.execCommand('copy');
                    copyBtn.textContent = 'Copied (Fallback)!';
                    setTimeout(() => copyBtn.textContent = 'Copy Formatted', 2000);
                } catch (err2) {
                    alert('Could not copy automatically. Please select the result and copy manually.');
                }
                window.getSelection().removeAllRanges();
            }
        };
    </script>
</body>
</html>
